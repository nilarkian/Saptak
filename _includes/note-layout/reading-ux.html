<style>

/* ── READING PROGRESS BAR ── */
#read-progress{
  position:fixed;top:0;left:0;
  height:3px;width:0%;
  background:#111;z-index:999;
  transition:width .1s linear,background .2s;
}
body.dark #read-progress{background:#4e9fd4;}

/* ── READ TIME BADGE ── */
#read-time-badge{
  position:fixed;top:8px;left:16px;
  font-family:'Syne',Arial,sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  background:#111;color:#f7f7f7;
  padding:5px 12px;border-radius:999px;
  z-index:999;opacity:0;
  transition:opacity .3s,background .2s,color .2s;
  pointer-events:none;
}
#read-time-badge.visible{opacity:1;}
body.dark #read-time-badge{background:#252526;color:#d4d4d4;border:1px solid #3e3e42;}

/* ── BACK TO TOP ── */
#back-top{
  position:fixed;bottom:32px;right:32px;
  width:40px;height:40px;
  background:#111;color:#f7f7f7;
  border:none;border-radius:50%;
  font-size:18px;cursor:pointer;
  opacity:0;pointer-events:none;
  transition:opacity .2s,background .2s,color .2s;
  display:flex;align-items:center;justify-content:center;
  z-index:998;
}
#back-top.visible{opacity:1;pointer-events:auto;}
#back-top:hover{opacity:.75;}
body.dark #back-top{background:#252526;color:#d4d4d4;border:1px solid #3e3e42;}

@media(max-width:768px){
  #back-top{bottom:20px;right:16px;}
}

</style>

<script>
// ── READING PROGRESS + READ TIME BADGE ──
(function(){
  var bar   = document.getElementById('read-progress');
  var badge = document.getElementById('read-time-badge');
  var body  = document.getElementById('note-body');

  var words = body.textContent.trim().split(/\s+/).filter(Boolean).length;
  var totalMins = Math.ceil(words / 338);
  badge.textContent = totalMins < 1 ? '< 1 min read' : totalMins + ' min read';

  window.addEventListener('scroll', function() {
    var total = body.getBoundingClientRect().bottom + window.scrollY - window.innerHeight;
    var ratio = Math.min(1, window.scrollY / total);
    bar.style.width = (ratio * 100) + '%';

    var pct = ratio * 100;
    if (pct < 5) {
      badge.textContent = totalMins < 1 ? '< 1 min read' : totalMins + ' min read';
      badge.classList.toggle('visible', false);
    } else if (pct >= 99) {
      badge.classList.toggle('visible', false);
    } else {
      var remaining = Math.ceil(totalMins * (1 - ratio));
      badge.textContent = remaining < 1 ? '< 1 min left' : remaining + ' min left';
      badge.classList.toggle('visible', true);
    }
  }, {passive:true});
})();

// ── BACK TO TOP ──
(function(){
  var btn = document.getElementById('back-top');
  window.addEventListener('scroll', function() {
    btn.classList.toggle('visible', window.scrollY > 400);
  }, {passive:true});
  btn.addEventListener('click', function() {
    window.scrollTo({top:0, behavior:'smooth'});
  });
})();
</script>
