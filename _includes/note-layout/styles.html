<style>

/* ── HIGHLIGHT MARKER ── */
.note-body .highlight2{
  background:linear-gradient(transparent 35%,#f6d365 35%,#f6d365 85%,transparent 85%);
  padding:0 .08em;
  box-shadow:inset 0 -1.1em #f6d365;
}

/* ── SKIP NAV ── */
.skip-link{
  position:absolute;top:-100%;left:0;
  padding:8px 16px;
  background:#f7f7f7;color:#111;
  font-family:'Syne',Arial,sans-serif;font-size:13px;font-weight:700;letter-spacing:.04em;
  z-index:9999;text-decoration:none;transition:top .15s;
}
.skip-link:focus{top:0;outline:2px solid #c8440a;outline-offset:2px;}
body.dark .skip-link{background:#1e1e1e;color:#d4d4d4;}

/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'EB Garamond',Georgia,serif;
  background:#f7f7f7;color:#111;
  display:flex;min-height:100vh;
  transition:background .2s,color .2s;
}
a{text-decoration:none;color:#111;}

/* ── LINKS IN NOTE BODY ── */
.note-body a{color:#c8440a;text-decoration:underline;text-underline-offset:3px;font-weight:600;transition:.2s;}
.note-body a:visited{color:#c8440a;}
.note-body a:hover{opacity:.55;}

/* ── MAIN CONTENT AREA ── */
.main{
  margin-left:200px;margin-right:auto;flex:1;
  padding:60px 64px 120px;max-width:860px;
  transition:margin-left .25s ease;
}
body.toc-collapsed .main{margin-left:44px;max-width:1060px;}

/* ── BREADCRUMB ── */
.breadcrumb{
  font-family:'Syne',Arial,sans-serif;font-size:12px;color:#767676;
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:24px;
}
.breadcrumb span{margin:0 6px;}

/* ── TOPIC TAG ── */
.topic-tag{
  font-family:'Syne',Arial,sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;
  background:#111;color:#f7f7f7;
  display:inline-block;padding:4px 12px;border-radius:999px;margin-bottom:20px;
  transition:background .2s,color .2s;
}

/* ── TITLE ── */
.note-title{
  font-family:'Syne',Arial,sans-serif;font-size:38px;font-weight:700;
  line-height:1.2;letter-spacing:-1.5px;margin-bottom:10px;
}

/* ── META LINE ── */
.meta{
  font-family:'Syne',Arial,sans-serif;font-size:13px;color:#767676;
  margin-bottom:52px;display:flex;gap:8px;
}

/* ── SERIES PILL ── */
.series-pill{
  font-family:'Syne',Arial,sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;text-decoration:none;
  color:#767676;padding:2px 10px;border-radius:999px;
  border:1px solid #ccc;background:transparent;
  transition:color .15s,border-color .15s,background .15s;
}
.series-pill:hover{color:#111;border-color:#999;background:rgba(0,0,0,.04);}
.series-pill:visited{color:#767676;}
.meta-dot{color:#999;}

/* ── MARKDOWN PROSE ── */
.note-body{font-size:19px;line-height:1.9;}
.note-body p{margin-bottom:26px;}

.note-body h1{font-family:'Syne',Arial,sans-serif;font-size:28px;font-weight:700;margin:64px 0 16px;letter-spacing:-.5px;scroll-margin-top:32px;}
.note-body h2{font-family:'Syne',Arial,sans-serif;font-size:22px;font-weight:700;margin:56px 0 14px;letter-spacing:-.3px;scroll-margin-top:32px;}
.note-body h3{font-family:'Syne',Arial,sans-serif;font-size:17px;font-weight:700;margin:36px 0 10px;scroll-margin-top:32px;}
.note-body h4{font-family:'Syne',Arial,sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.6;margin:28px 0 8px;scroll-margin-top:32px;}
.note-body h5,.note-body h6{font-family:'Syne',Arial,sans-serif;font-size:14px;font-weight:600;margin:20px 0 6px;scroll-margin-top:32px;}

.note-body hr{border:none;border-top:1px solid #ccc;margin:52px 0;transition:border-color .2s;}

.note-body ul,.note-body ol{padding-left:24px;margin-bottom:26px;}
.note-body li{margin-bottom:8px;}
.note-body li > ul,.note-body li > ol{margin-top:6px;margin-bottom:0;}

.note-body img{max-width:100%;height:auto;border-radius:8px;margin:28px 0;display:block;}
.note-body img + em{display:block;text-align:center;font-size:14px;opacity:.5;margin-top:-18px;margin-bottom:28px;font-style:italic;}

.note-body code{font-family:monospace;font-size:15px;background:rgba(0,0,0,.07);padding:2px 6px;border-radius:4px;transition:background .2s;}
.note-body pre{background:#1a1a1a;color:#f0f0f0;padding:48px 24px 24px;border-radius:12px;overflow-x:auto;margin-bottom:28px;font-size:13px;line-height:1.7;position:relative;white-space:pre-wrap;word-break:break-word;}
.note-body pre code{background:none;padding:0;border-radius:0;white-space:pre-wrap;word-break:break-word;}

.note-body .task-list-item{list-style:none;margin-left:-20px;}
.note-body .task-list-item input[type="checkbox"]{margin-right:8px;accent-color:#111;}
.note-body del{opacity:.45;}

.note-body kbd{font-family:monospace;font-size:13px;background:#f0f0f0;border:1px solid #ccc;border-bottom:2px solid #bbb;border-radius:4px;padding:1px 6px;transition:background .2s,border-color .2s;}

.note-body dl{margin-bottom:26px;}
.note-body dt{font-family:'Syne',Arial,sans-serif;font-weight:700;font-size:16px;margin-top:16px;}
.note-body dd{padding-left:20px;opacity:.8;}

.note-body sup{font-size:11px;line-height:0;vertical-align:super;}

.note-body .footnotes{margin-top:64px;font-size:14px;opacity:.55;line-height:1.6;}
.note-body .footnotes hr{margin:0 0 20px;}
.note-body .footnotes ol{padding-left:20px;}
.note-body .footnotes li{margin-bottom:6px;}

/* ── FOOTER ── */
.note-footer{
  font-family:'Syne',Arial,sans-serif;font-size:13px;color:#767676;
  margin-top:80px;border-top:1px solid #ccc;padding-top:28px;transition:border-color .2s;
}

/* ── MOBILE / TABLET ── */
@media(max-width:768px){
  .main{margin-left:0;padding:40px 24px 80px;}
  .note-title{font-size:28px;}
}
@media(max-width:1024px){
  .main{padding:60px 40px 100px;}
}

/* ── DARK MODE ── */
body.dark{background:#1e1e1e;color:#d4d4d4;}
body.dark a{color:#d4d4d4;}
body.dark .note-body a,
body.dark .note-body a:visited{color:#d4875a;}
body.dark .note-body a:hover{opacity:.65;}
body.dark .note-title,
body.dark .note-body h1,
body.dark .note-body h2,
body.dark .note-body h3,
body.dark .note-body h4,
body.dark .note-body h5,
body.dark .note-body h6{color:#e8e8e8;}
body.dark .breadcrumb,
body.dark .meta{color:#909090;}
body.dark .series-pill{color:#909090;border-color:#3e3e42;}
body.dark .series-pill:hover{color:#e8e8e8;border-color:#666;background:rgba(255,255,255,.06);}
body.dark .series-pill:visited{color:#909090;}
body.dark .meta-dot{color:#555;}
body.dark .note-body code{background:#252526;color:#ce9178;}
body.dark .note-body pre{background:#252526;border:1px solid #3e3e42;}
body.dark .note-body hr,
body.dark .note-footer{border-color:#3e3e42;color:#909090;}
body.dark .note-body kbd{background:#252526;border-color:#4e4e52;border-bottom-color:#3a3a3e;color:#d4d4d4;}
body.dark .topic-tag{background:#252526;color:#d4d4d4;border:1px solid #3e3e42;}

</style>
