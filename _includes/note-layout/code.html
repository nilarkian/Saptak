<style>

/* ── CODE COPY BUTTON ── */
.copy-btn{
  position:absolute;top:12px;right:12px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.55);
  font-family:'Syne',Arial,sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  padding:5px 12px;border-radius:6px;cursor:pointer;transition:.15s;
}
.copy-btn:hover{background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);}
.copy-btn.copied{color:#6fcf97;border-color:#6fcf97;}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>

<script>
// ── COPY BUTTONS FOR CODE BLOCKS ──
document.querySelectorAll('.note-body pre').forEach(function(pre) {
  var code = pre.querySelector('code');
  if (!code) return;

  var btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.innerHTML = '⎘ Copy';
  btn.setAttribute('aria-label', 'Copy code');

  btn.addEventListener('click', function() {
    var text = code.textContent.trim();
    function fallback() {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0;';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    function done() {
      btn.innerHTML = '✓ Copied';
      btn.classList.add('copied');
      setTimeout(function() { btn.innerHTML = '⎘ Copy'; btn.classList.remove('copied'); }, 1500);
      liveRegion.textContent = 'Code copied';
      setTimeout(function() { liveRegion.textContent = ''; }, 1500);
    }
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(done).catch(fallback);
    } else {
      fallback();
      done();
    }
  });

  pre.insertBefore(btn, pre.firstChild);
});

// ── ARIA LIVE REGION FOR COPY FEEDBACK ──
var liveRegion = document.createElement('div');
liveRegion.setAttribute('aria-live', 'polite');
liveRegion.setAttribute('aria-atomic', 'true');
liveRegion.style.cssText = 'position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);';
document.body.appendChild(liveRegion);
</script>
