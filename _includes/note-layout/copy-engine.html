<script>
window.CopyEngine = (function() {
  'use strict';

  var VERSION = '1.1.0';

  // ── Private state ──────────────────────────────────────────────────────────
  var _queue    = [];       // {type:'text'|'table'|'mermaid', el:Element}
  var _idx      = 0;        // next item to copy (NOT incremented until copy succeeds)
  var _state    = 'IDLE';
  var _busy     = false;    // reentrancy guard
  var _session  = 0;        // incremented on reset(); stale copies abort their writes
  var _lastError = null;    // { code, message } | null
  var _counters  = { attempts: 0, succeeded: 0, failed: 0 };
  var _timings   = { lastMs: null, avgMs: null, _totalMs: 0 };

  // ── State machine ──────────────────────────────────────────────────────────
  // Legal transitions only. reset() bypasses this and force-sets IDLE.
  var ALLOWED = {
    IDLE:    ['COPYING', 'DONE'],
    COPYING: ['READY',   'DONE', 'ERROR'],
    READY:   ['COPYING', 'DONE'],
    DONE:    [],
    ERROR:   []
  };

  function _transition(to) {
    var allowed = ALLOWED[_state];
    if (!allowed || allowed.indexOf(to) === -1) {
      throw new Error('CopyEngine: illegal transition ' + _state + ' → ' + to);
    }
    _state = to;
    window.copyState = to;
    document.documentElement.setAttribute('data-copy-state', to);
  }

  // ── Queue builder ──────────────────────────────────────────────────────────
  // Walks .note-body direct children in DOM order.
  // Consecutive non-image children are grouped into a detached <div> text chunk.
  // Image children (table-scroll-wrapper → table, mermaid-wrapper) become PNG items.
  function _buildQueue() {
    _queue = [];
    var body = document.querySelector('.note-body');
    if (!body) return;

    var textBuf = [];

    function flushText() {
      if (!textBuf.length) return;
      var wrapper = document.createElement('div');
      textBuf.forEach(function(el) { wrapper.appendChild(el.cloneNode(true)); });
      if (wrapper.textContent.trim().length > 0) {
        _queue.push({ type: 'text', el: wrapper });
      }
      textBuf = [];
    }

    Array.from(body.children).forEach(function(child) {
      var tag = child.tagName.toLowerCase();
      if (tag === 'script' || tag === 'style') return;
      if (child.classList.contains('mermaid-wrapper')) {
        flushText();
        _queue.push({ type: 'mermaid', el: child });
      } else if (child.classList.contains('table-scroll-wrapper')) {
        var tbl = child.querySelector('table');
        if (tbl) { flushText(); _queue.push({ type: 'table', el: tbl }); }
      } else {
        textBuf.push(child);
      }
    });
    flushText();
  }

  // ── Error classifier ───────────────────────────────────────────────────────
  function _classify(err, el, type) {
    if (!err) return 'UNKNOWN';
    if (err.name === 'NotAllowedError') return 'CLIPBOARD_DENIED';
    var m = err.message || '';
    if (/not rendered|no \.mermaid/i.test(m)) return 'SVG_NOT_FOUND';
    if (type === 'table' && el && !document.contains(el)) return 'TABLE_NOT_FOUND';
    if (/execCommand/i.test(m)) return 'COPY_FAILED';
    if (/html-to-image|toBlob|clipboard/i.test(m)) return 'COPY_FAILED';
    return 'UNKNOWN';
  }

  // ── Response builder ───────────────────────────────────────────────────────
  // Always returns all fields so AHK can rely on a stable shape.
  function _response(success, copiedType, durationMs, error) {
    return {
      success:      success,
      state:        _state,
      remaining:    Math.max(0, _queue.length - _idx),
      copiedType:   copiedType  != null ? copiedType  : null,
      currentIndex: _idx,
      totalItems:   _queue.length,
      durationMs:   durationMs  != null ? durationMs  : null,
      error:        error        != null ? error        : null
    };
  }

  // ── Public: next() ─────────────────────────────────────────────────────────
  // Copy the next element in the queue. Returns a structured JSON response.
  // Does NOT advance index on failure so the same item can be retried after reset().
  async function next() {
    // Reentrancy guard — double next() while a copy is in flight
    if (_busy) {
      return _response(false, null, null, {
        code: 'COPY_FAILED',
        message: 'copy already in progress'
      });
    }

    // Terminal-state guards — only reset() can escape these
    if (_state === 'DONE') {
      return _response(false, null, null, {
        code: 'QUEUE_EMPTY',
        message: 'all items copied; call CopyEngine.reset() to start over'
      });
    }
    if (_state === 'ERROR') {
      return _response(false, null, null, {
        code: 'COPY_FAILED',
        message: 'previous copy failed; call CopyEngine.reset() before retrying'
      });
    }

    // Queue exhausted
    if (_idx >= _queue.length) {
      _transition('DONE');
      return _response(false, null, null, {
        code: 'QUEUE_EMPTY',
        message: 'no more items in queue'
      });
    }

    var item       = _queue[_idx];   // {type, el} — capture but do NOT increment yet
    var copiedType = item.type;
    var mySession  = _session;
    var t0         = performance.now();
    var durationMs = null;

    _transition('COPYING');
    _busy = true;
    _counters.attempts++;

    try {
      if (item.type === 'table') {
        await window._copyTablePNG(item.el);
      } else if (item.type === 'mermaid') {
        await window._copyMermaidPNG(item.el);
      } else {
        await window._copyTextHTML(item.el);
      }

      durationMs = Math.round(performance.now() - t0);

      // If reset() was called during the async copy, this result is stale.
      // reset() already restored IDLE state — skip our writes.
      if (_session !== mySession) {
        return _response(false, null, durationMs, {
          code: 'COPY_FAILED',
          message: 'copy superseded by reset()'
        });
      }

      _idx++;
      _counters.succeeded++;
      _timings.lastMs   = durationMs;
      _timings._totalMs += durationMs;
      _timings.avgMs    = Math.round(_timings._totalMs / _counters.succeeded);
      _lastError        = null;

      // Transition: DONE if no more items, else READY
      if (_idx >= _queue.length) {
        _transition('DONE');
      } else {
        _transition('READY');
      }

      return _response(true, copiedType, durationMs, null);

    } catch (err) {
      durationMs = Math.round(performance.now() - t0);

      if (_session !== mySession) {
        return _response(false, null, durationMs, {
          code: 'COPY_FAILED',
          message: 'copy superseded by reset()'
        });
      }

      var code = _classify(err, item.el, item.type);
      _lastError = { code: code, message: err ? (err.message || String(err)) : 'unknown error' };
      _counters.failed++;
      _transition('ERROR');

      return _response(false, null, durationMs, _lastError);

    } finally {
      _busy = false;
    }
  }

  // ── Public: reset() ────────────────────────────────────────────────────────
  // Escape hatch from any state. Rebuilds queue (mermaid may have re-rendered
  // or theme toggled since last build). Returns { success, state, totalItems }.
  function reset() {
    _session++;               // stale in-flight copies detect this and abort writes
    _idx       = 0;
    _busy      = false;
    _lastError = null;
    _buildQueue();
    _state = 'IDLE';          // force — bypasses _transition intentionally
    window.copyState = 'IDLE';
    document.documentElement.setAttribute('data-copy-state', 'IDLE');
    return { success: true, state: 'IDLE', totalItems: _queue.length };
  }

  // ── Public: status() ───────────────────────────────────────────────────────
  function status() {
    return {
      state:        _state,
      currentIndex: _idx,
      totalItems:   _queue.length,
      remaining:    Math.max(0, _queue.length - _idx)
    };
  }

  // ── Public: diagnostics() ──────────────────────────────────────────────────
  // Full snapshot for debugging. Safe to call at any time; no side effects.
  function diagnostics() {
    return {
      version:      VERSION,
      state:        _state,
      currentIndex: _idx,
      totalItems:   _queue.length,
      remaining:    Math.max(0, _queue.length - _idx),
      counters: {
        attempts:  _counters.attempts,
        succeeded: _counters.succeeded,
        failed:    _counters.failed
      },
      timings: {
        lastMs: _timings.lastMs,
        avgMs:  _timings.avgMs
      },
      lastError: _lastError,
      queue: _queue.map(function(item, i) {
        return { index: i, type: item.type };
      }),
      timestamp: Date.now()
    };
  }

  // ── Public: version() ──────────────────────────────────────────────────────
  function version() { return VERSION; }

  // ── Keyboard shortcut ──────────────────────────────────────────────────────
  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'x') {
      e.preventDefault();
      next();   // call local fn directly — window.CopyEngine assigned after IIFE
    }
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  _buildQueue();
  window.copyState = 'IDLE';
  document.documentElement.setAttribute('data-copy-state', 'IDLE');

  return { next: next, reset: reset, status: status, diagnostics: diagnostics, version: version };
})();

// ── Text chunk copy ────────────────────────────────────────────────────────────
// Copies a detached <div> of cloned note-body children as rich text.
// Uses execCommand('copy') rather than ClipboardItem({text/html}) — ClipboardItem
// text/html writes resolve without error but produce empty clipboard content on
// remote HTTPS origins (GitHub Pages). execCommand is origin-agnostic and
// preserves headings, bold, lists, links reliably on both localhost and live.
window._copyTextHTML = function(containerEl) {
  var tmp = document.createElement('div');
  tmp.setAttribute('contenteditable', 'true');
  tmp.style.cssText = 'position:fixed;left:-9999px;top:0;white-space:normal;';
  tmp.innerHTML = containerEl.innerHTML;
  document.body.appendChild(tmp);
  try {
    var range = document.createRange();
    range.selectNodeContents(tmp);
    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    var ok = document.execCommand('copy');
    sel.removeAllRanges();
    if (!ok) throw new Error('execCommand copy returned false');
  } finally {
    document.body.removeChild(tmp);
  }
};
</script>
