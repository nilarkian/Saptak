<style>

/* ── BLOCKQUOTES ── */
.note-body blockquote{
  margin:36px 0;padding:20px 28px;
  border-left:4px solid #111;background:rgba(0,0,0,.04);
  border-radius:0 10px 10px 0;font-size:19px;
  transition:border-color .2s,background .2s;
}
body.dark .note-body blockquote{border-left-color:#4e9fd4;background:rgba(78,159,212,.06);}

/* ── TABLES ── */
.table-scroll-wrapper{
  overflow-x:auto;margin-bottom:40px;
  -webkit-overflow-scrolling:touch;position:relative;
}
.table-scroll-wrapper table{margin-bottom:0;}
.note-body table{width:100%;border-collapse:collapse;font-size:15.5px;}
.note-body th{
  font-family:'Syne',Arial,sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.11em;text-transform:uppercase;text-align:left;
  padding:0 18px 11px;background:none;border:none;
  border-bottom:2px solid #c8440a;color:#111;
  transition:border-color .2s,color .2s;
}
.note-body td{
  padding:12px 18px;border:none;
  border-bottom:1px solid rgba(0,0,0,.08);
  vertical-align:top;transition:border-color .2s;
}
.note-body tr:last-child td{border-bottom:none;}
.note-body tr:nth-child(even) td{background:none;}

.table-copy-btn{
  position:absolute;top:12px;right:12px;
  background:#111;color:#f7f7f7;
  border:none;border-radius:6px;padding:6px 12px;
  font-family:'Syne',Arial,sans-serif;font-size:11px;font-weight:600;
  cursor:pointer;z-index:10;opacity:0;transition:opacity .15s;
}
.table-scroll-wrapper:hover .table-copy-btn{opacity:1;}
.table-copy-btn:hover{opacity:.85;}
body.dark .table-copy-btn{background:#252526;color:#d4d4d4;border:1px solid #3e3e42;}
body.dark .note-body th{background:none;border-bottom-color:#d4875a;color:#e8e8e8;}
body.dark .note-body td{border-bottom-color:rgba(255,255,255,.09);}
body.dark .note-body tr:nth-child(even) td{background:none;}

/* ── CALLOUTS (Obsidian-style > [!type] Title) ── */
.note-body blockquote.callout{padding:14px 22px;border-radius:0 10px 10px 0;}
.callout-title{
  font-family:'Syne',Arial,sans-serif;font-size:12px;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;
}
.note-body blockquote.callout-info    {border-left-color:#4e9fd4;background:rgba(78,159,212,.07);}
.note-body blockquote.callout-tip     {border-left-color:#788C5D;background:rgba(120,140,93,.07);}
.note-body blockquote.callout-success {border-left-color:#788C5D;background:rgba(120,140,93,.07);}
.note-body blockquote.callout-warning {border-left-color:#D97757;background:rgba(217,119,87,.07);}
.note-body blockquote.callout-important{border-left-color:#B04A3F;background:rgba(176,74,63,.07);}
.note-body blockquote.callout-note    {border-left-color:#87867F;background:rgba(135,134,127,.07);}
.note-body blockquote.callout-abstract{border-left-color:#4e9fd4;background:rgba(78,159,212,.05);}
.note-body blockquote.callout-example {border-left-color:#E3DACC;background:rgba(227,218,204,.25);}
.callout-info .callout-title    {color:#4e9fd4;}
.callout-tip .callout-title     {color:#788C5D;}
.callout-success .callout-title {color:#788C5D;}
.callout-warning .callout-title {color:#D97757;}
.callout-important .callout-title{color:#B04A3F;}
.callout-note .callout-title    {color:#87867F;}
.callout-abstract .callout-title{color:#4e9fd4;}
.callout-example .callout-title {color:#87867F;}
body.dark .note-body blockquote.callout-info    {background:rgba(78,159,212,.09);}
body.dark .note-body blockquote.callout-tip     {background:rgba(120,140,93,.09);}
body.dark .note-body blockquote.callout-success {background:rgba(120,140,93,.09);}
body.dark .note-body blockquote.callout-warning {background:rgba(217,119,87,.09);}
body.dark .note-body blockquote.callout-important{background:rgba(176,74,63,.09);}
body.dark .note-body blockquote.callout-note    {background:rgba(135,134,127,.09);}
body.dark .note-body blockquote.callout-abstract{background:rgba(78,159,212,.07);}
body.dark .note-body blockquote.callout-example {background:rgba(227,218,204,.07);}

</style>

<script>
// ── TABLE OVERFLOW WRAPPERS ──
document.querySelectorAll('.note-body table').forEach(function(t) {
  var wrapper = document.createElement('div');
  wrapper.className = 'table-scroll-wrapper';
  t.parentNode.insertBefore(wrapper, t);
  wrapper.appendChild(t);
});

// ── PNG COPY BUTTONS FOR TABLES ──
window._copyTablePNG = async function(tableEl) {
  var blob = await htmlToImage.toBlob(tableEl, {
    pixelRatio: 2,
    skipFonts: false,
    cacheBust: true,
    backgroundColor: document.body.classList.contains('dark') ? '#1e1e1e' : '#f7f7f7'
  });
  await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
};

document.querySelectorAll('.note-body table').forEach(function(table) {
  var wrapper = table.parentElement;
  var btn = document.createElement('button');
  btn.className = 'table-copy-btn';
  btn.textContent = '📷 copy';
  btn.addEventListener('click', async function() {
    try {
      await window._copyTablePNG(table);
      btn.textContent = '✓ Copied';
      setTimeout(function() { btn.textContent = '📷 copy'; }, 1500);
    } catch(err) {
      console.error(err);
      btn.textContent = '✗ Failed';
      setTimeout(function() { btn.textContent = '📷 copy'; }, 1500);
    }
  });
  wrapper.appendChild(btn);
});

// ── CALLOUT TRANSFORM (Obsidian > [!type] Title → .callout) ──
document.querySelectorAll('.note-body blockquote').forEach(function(bq) {
  var firstP = bq.querySelector('p');
  if (!firstP) return;
  var html = firstP.innerHTML;
  var m = html.match(/^\[!(\w+)\]\s*([^\n<]*)/i);
  if (!m) return;
  var type = m[1].toLowerCase();
  var title = m[2].trim() || (type.charAt(0).toUpperCase() + type.slice(1));
  firstP.innerHTML = html.replace(/^\[!\w+\]\s*[^\n<]*(?:<br\s*\/?>)?\s*/i, '').trim();
  if (!firstP.innerHTML) firstP.remove();
  bq.classList.add('callout', 'callout-' + type);
  var titleEl = document.createElement('div');
  titleEl.className = 'callout-title';
  titleEl.textContent = title;
  bq.insertBefore(titleEl, bq.firstChild);
});
</script>

<script src="https://unpkg.com/html-to-image/dist/html-to-image.js"></script>
