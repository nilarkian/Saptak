<style>
.reset-chip {
  display: none;
  align-items: center;
  gap: 14px;
  padding: 7px 7px 7px 16px;
  margin: 0 0 28px auto;
  background: rgba(200, 68, 10, 0.07);
  border: 1.5px solid var(--ink, #111);
  border-radius: var(--pill, 999px);
  font-family: var(--font-head, Arial, sans-serif);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink, #111);
  cursor: pointer;
  transition: background .2s ease, transform .18s ease, box-shadow .2s ease;
  width: fit-content;
  user-select: none;
}
.reset-chip.visible {
  display: flex;
  animation: chipFadeIn .26s ease;
}
.reset-chip:hover {
  background: rgba(200, 68, 10, 0.14);
  transform: translateY(-1px);
  box-shadow: 0 6px 14px rgba(0,0,0,.08);
}
.reset-chip:focus-visible {
  outline: 2px solid var(--accent, #c8440a);
  outline-offset: 3px;
}

.reset-chip-label .chip-meta {
  opacity: .55;
  letter-spacing: .04em;
  text-transform: uppercase;
  font-size: 10px;
  font-weight: 700;
  margin-right: 6px;
}
.reset-chip-label .chip-cat {
  font-weight: 700;
  letter-spacing: -.2px;
}
.reset-chip-label .chip-tag {
  color: var(--accent, #c8440a);
  font-weight: 700;
  letter-spacing: -.2px;
}
.reset-chip-label .chip-divider {
  opacity: .35;
  margin: 0 8px;
  font-weight: 400;
}

.reset-chip-action {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 13px;
  background: var(--ink, #111);
  color: var(--bg, #f7f7f7);
  border-radius: var(--pill, 999px);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  white-space: nowrap;
}

.chip-kbd {
  font-family: var(--font-body, Arial, sans-serif);
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  margin-left: 2px;
  background: rgba(255, 255, 255, 0.18);
  border: 1px solid rgba(255, 255, 255, 0.28);
  border-radius: 4px;
  letter-spacing: 0;
  line-height: 1;
}

@keyframes chipFadeIn {
  from { opacity: 0; transform: translateY(-5px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>

<div class="reset-chip" id="reset-chip" role="button" tabindex="0" aria-label="Reset all filters">
  <span class="reset-chip-label" id="reset-chip-label" aria-live="polite"></span>
  <span class="reset-chip-action">↺ Reset · <kbd class="chip-kbd">R</kbd></span>
</div>

<script>
(function() {
  var chip = document.getElementById('reset-chip');
  chip.addEventListener('click', function() { if (window.resetAllFilters) window.resetAllFilters(); });
  chip.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      if (window.resetAllFilters) window.resetAllFilters();
    }
  });
  document.addEventListener('keydown', function(e) {
    if (e.key.toLowerCase() !== 'r') return;
    if (e.metaKey || e.ctrlKey || e.altKey || e.shiftKey) return;
    var t = e.target;
    var tag = t.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || t.isContentEditable) return;
    if (!chip.classList.contains('visible')) return;
    e.preventDefault();
    if (window.resetAllFilters) window.resetAllFilters();
    chip.style.transform = 'translateY(-1px) scale(0.96)';
    setTimeout(function() { chip.style.transform = ''; }, 130);
  });
})();
</script>
