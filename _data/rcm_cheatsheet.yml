# RCM Master Cheat-Sheet — source for /notes/rcm/cheatsheet
# To evolve: append rows to any section, or add a new section. Rebuild Jekyll → appears on the page.
# Structure: sections[] → title, rows[] → cue, answer

sections:

  - title: "The 5 Participants"
    rows:
      - cue: "Member"
        answer: "The US policyholder / patient"
      - cue: "Provider"
        answer: "Individual or organization delivering care (doctors, hospitals)"
      - cue: "Payer"
        answer: "The insurance company — pays the claim"
      - cue: "Supplier"
        answer: "Supplies medical equipment or supplies for treating illness"
      - cue: "Researcher"
        answer: "Conducts experiments and studies for human health"

  - title: "HIPAA at a Glance"
    rows:
      - cue: "HIPAA enacted"
        answer: "1996, by DHHS"
      - cue: "What HIPAA protects"
        answer: "PHI — Protected Health Information (name, DOB, SSN, MRN, address, phone, admission/discharge dates, photos)"
      - cue: "4 entities bound by HIPAA"
        answer: "1. Health Care Providers  2. Health Care Plans  3. HCCH (Clearing House)  4. Business Associates"
      - cue: "HCCH role"
        answer: "Standardizes non-standardized billing data and forwards it to payers"

  - title: "Medicare vs Medicaid"
    rows:
      - cue: "Medicare — run by"
        answer: "Federal government"
      - cue: "Medicare — covers"
        answer: "80% (patient pays ~20%)"
      - cue: "Medicare — age criterion"
        answer: "65+ OR disabled (24 months SSI) OR 40 quarters US tax paid"
      - cue: "Medicare — also covers"
        answer: "ESRD (End Stage Renal Disease)"
      - cue: "Medicaid — run by"
        answer: "Joint state + federal (state-supervised, federally monitored)"
      - cue: "Medicaid — covers"
        answer: "100%"
      - cue: "Medicaid — who qualifies"
        answer: "Below federal poverty line; disabled; pregnant women; children. No age limit."
      - cue: "Medicaid — payer order"
        answer: "Payer of LAST resort when member has multiple coverages"
      - cue: "Mnemonic"
        answer: "Medicare = 'Rich'/65+ (federal). Medicaid = 'Poor' (state+federal)."

  - title: "Medicare Parts A–D"
    rows:
      - cue: "Part A"
        answer: "Hospital / Inpatient — stays ≥ 24 hours. Premium-free at 65+."
      - cue: "Part B"
        answer: "Outpatient / Medical — visits < 24 hrs + DME. Optional add-on."
      - cue: "Part C"
        answer: "Medicare Advantage — bundles A + B + extras (dental, vision, hearing, transport, gym)"
      - cue: "Part D"
        answer: "Prescription Drug Plan (PDP) — optional; covers medicines and vaccines"
      - cue: "MAPD"
        answer: "Medicare Advantage Prescription Drug plan = Part C + Part D together"
      - cue: "DME (under Part B)"
        answer: "Durable Medical Equipment — rented/purchased for repeated home use (walkers, wheelchairs, hospital beds)"

  - title: "Government Programs"
    rows:
      - cue: "TRICARE / CHAMPUS"
        answer: "Military personnel (active, deceased, disabled, retirees) + their dependents"
      - cue: "CHAMPVA"
        answer: "War veterans (active, deceased, disabled, partially disabled) + their dependents"
      - cue: "No-Fault Liability"
        answer: "Covers injury or property damage from accidents regardless of who was at fault (optional, add-on)"
      - cue: "Workers' Compensation"
        answer: "Covers injuries sustained on work premises or during active work hours"

  - title: "Managed Care Plan Types"
    rows:
      - cue: "HMO"
        answer: "Health Maintenance Organization — in-network only + PCP referral required. Lowest cost."
      - cue: "PPO"
        answer: "Preferred Provider Organization — flexible, OON allowed, no referral. Higher cost."
      - cue: "EPO"
        answer: "Exclusive Provider Organization — in-network only (like HMO) but NO referral required"
      - cue: "POS"
        answer: "Point of Service — hybrid HMO/PPO; PCP referral for in-network, self-refer OON at higher cost"
      - cue: "HMO referral needed?"
        answer: "YES — PCP must refer to specialists"
      - cue: "PPO OON allowed?"
        answer: "YES — at higher cost share"
      - cue: "2 rules of Managed Care"
        answer: "1. Authorization/Referral ALWAYS required  2. Member ALWAYS visits in-network"

  - title: "Provider Types"
    rows:
      - cue: "Individual Providers"
        answer: "PCP (Primary Care Physician) + Specialists"
      - cue: "Facility Providers"
        answer: "Hospital · SNF · ASC · Home Health · Hospice"
      - cue: "PCP role"
        answer: "First point of contact / gatekeeper; issues referrals to specialists"
      - cue: "SNF"
        answer: "Skilled Nursing Facility — post-surgical recovery + ADL care"
      - cue: "ASC"
        answer: "Ambulatory Surgical Center — same-day surgery (e.g. cataract surgery)"
      - cue: "Hospice"
        answer: "End-of-life care at home for terminally ill patients"
      - cue: "INN provider"
        answer: "Participating provider — has contract with payer → lower member cost"
      - cue: "OON provider"
        answer: "Non-participating provider — no contract → higher member cost"

  - title: "Authorization & Referral"
    rows:
      - cue: "Authorization"
        answer: "Designated permission from health plan to perform a service on a member"
      - cue: "Referral"
        answer: "The first-time authorization (PCP → insurance, for specialist visit)"
      - cue: "4 ways to initiate auth"
        answer: "1. Phone call  2. Online portal  3. PA Form  4. E-Fax"
      - cue: "Call: PCP → insurance"
        answer: "Referral call"
      - cue: "Call: Specialist → insurance (for service)"
        answer: "Authorization call"

  - title: "Payment Models"
    rows:
      - cue: "Capitation"
        answer: "Fixed per-member-per-month (PHPM) payment — same $ regardless of visit count. Rewards keeping patients healthy."
      - cue: "Fee for Service (FFS)"
        answer: "Paid separately per service rendered (unbundled). More procedures = more revenue. Rewards volume."

  - title: "The 5 Code Sets"
    rows:
      - cue: "CPT"
        answer: "Current Procedural Terminology — procedures/services/treatments. 5-digit numeric (e.g. 10040 acne surgery, 66984 cataract)"
      - cue: "ICD / ICD-10"
        answer: "International Classification of Disease — condition/disease/symptoms. Alphanumeric (e.g. R51 headache, E11.22 diabetes)"
      - cue: "HCPCS"
        answer: "Healthcare Common Procedure Coding System — misc products + DME. 5 alphanumeric (e.g. E0265 hospital bed)"
      - cue: "Modifiers"
        answer: "Add extra clarity to a CPT (level 1) or HCPCS (level 2) code. 2 alphanumeric (e.g. RT, LT, 50)"
      - cue: "POS (Place of Service)"
        answer: "Where the service was rendered. 2-digit numeric (24=ASC, 12=Home, 11=Office)"
      - cue: "CPT vs ICD"
        answer: "CPT = what you DID (procedure). ICD = what they HAVE (diagnosis)."
      - cue: "New patient E/M codes"
        answer: "99202–99205"
      - cue: "Established patient E/M codes"
        answer: "99212–99215"

  - title: "Billing & Claims"
    rows:
      - cue: "TFL"
        answer: "Timely Filing Limit — deadline to submit claim, set by payer. Miss it = automatic denial."
      - cue: "TAT"
        answer: "Turn Around Time — time payer's adjudication team takes to decide on a claim (also: auth TAT)"
      - cue: "NPI"
        answer: "National Provider Identifier — 10-digit unique number per individual provider"
      - cue: "TIN"
        answer: "Tax Identification Number — 9-digit, shared by multiple providers in a group"
      - cue: "COB"
        answer: "Coordination of Benefits — determines which payer is primary / secondary / tertiary"
      - cue: "EOB"
        answer: "Explanation of Benefits — detailed claim-processing summary sent to provider + member"
      - cue: "Dual member"
        answer: "Member with both Medicare + Medicaid coverage simultaneously"
      - cue: "3 classic denial reasons"
        answer: "1. Filed after TFL  2. No active insurance on DOS  3. No authorization obtained"
      - cue: "Appeal"
        answer: "Challenge filed by provider when a claim is wrongly denied"

  - title: "Patient Responsibility (~20%)"
    rows:
      - cue: "PR-1 Deductible"
        answer: "Fixed dollar amount member pays first each calendar year before insurance covers costs"
      - cue: "PR-2 Co-Insurance"
        answer: "Percentage cost-share between member and insurer; exact $ known only AFTER claim processed"
      - cue: "PR-3 Co-Pay"
        answer: "Fixed dollar amount paid up-front at time of service"
      - cue: "OOP (Out of Pocket)"
        answer: "Total annual ceiling = Deductible + Co-Insurance + Co-Pay + non-covered. Once hit, insurance pays 100%."
      - cue: "Who pays ~80%"
        answer: "The payer (insurance company)"
      - cue: "Who pays ~20%"
        answer: "The member (patient responsibility)"
