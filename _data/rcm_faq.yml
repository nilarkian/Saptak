# ── PARTICIPANTS ──────────────────────────────────────────────────────────────

- cat: Participants
  q: "What is a Member in the context of health insurance?"
  a: "The Member is the US policyholder — the individual covered under a health insurance plan. The member's insurance ID, date of birth, and active coverage on the Date of Service are all verified before a claim is paid. The member is not always the patient; dependents on the policy are also members."

- cat: Participants
  q: "What is a Payer in the US healthcare system?"
  a: "The Payer is the insurance company — the entity that receives claims from providers and pays for covered medical services on behalf of its members. Payers include private insurers (Humana, Aetna, BCBS, UHC) and government programs (Medicare, Medicaid). On every claim, the Payer adjudicates and decides whether to pay, partially pay, or deny."

- cat: Participants
  q: "Why is it important to know who the 'Member' is vs the 'Provider'?"
  a: "In every RCM transaction, these two parties drive the claim. The member's insurance ID, date of birth, and eligibility determine coverage. The provider's NPI and TIN determine where payment goes. Mixing them up causes claim rejections from day one."

- cat: Participants
  q: "What's the difference between a Supplier and a Provider?"
  a: "A Provider delivers clinical care — doctors, hospitals, therapists. A Supplier provides physical goods: durable medical equipment like wheelchairs, walkers, or oxygen concentrators used to manage illness at home. Suppliers typically bill under HCPCS codes; providers use CPT codes."

- cat: Participants
  q: "Why is the Researcher included as one of the five participants?"
  a: "Healthcare isn't just treatment — it depends on evidence. Researchers generate the clinical trials and studies that determine which procedures are covered, what codes get assigned, and how payment policies evolve. They interact with the system via grants, IRB protocols, and data-sharing under HIPAA."

- cat: Participants
  q: "What are the five names a provider can be called on a claim or PA form?"
  a: "The same provider wears different labels depending on their function: Requesting (submits the PA form), Referring (sends the member to another provider), Ordering (orders a service or equipment), Servicing (performs the service), and Rendering (physically delivers the care). On a PA form, Requesting = Referring = Ordering on the Section A (submitting) side; Servicing = Rendering on the Section B (treating) side."

# ── HIPAA ─────────────────────────────────────────────────────────────────────

- cat: HIPAA
  q: "Why was HIPAA enacted and who enforces it?"
  a: "HIPAA was enacted in 1996 by Congress and is enforced by DHHS (Department of Health and Human Services) to protect the privacy and security of patients' health information as healthcare moved to electronic transactions. Before HIPAA, there was no federal standard for how health data was stored or transmitted. HIPAA mandates consistent safeguards across all covered entities to prevent unauthorized disclosure of PHI."

- cat: HIPAA
  q: "What is the difference between a Covered Entity and a Business Associate under HIPAA?"
  a: "A Covered Entity is one of the four primary HIPAA-bound parties: health care providers, health plans, and health care clearing houses. A Business Associate is a third-party vendor that handles PHI on behalf of a covered entity — billing companies, IT vendors, transcription services. The key distinction: covered entities create or use PHI directly; business associates process or access it for someone else."

- cat: HIPAA
  q: "Why does HIPAA matter to a Customer Support Rep?"
  a: "You will handle PHI on every call — member names, DOBs, claim details. HIPAA legally requires you to verify the caller's identity before sharing any information, and to share only what is necessary. Violations can result in fines ranging from $100 to $50,000 per incident, and willful violations carry criminal penalties."

- cat: HIPAA
  q: "What counts as PHI?"
  a: "Any individually identifiable health information tied to past, present, or future health status, treatment, or payment. This includes: name, DOB, SSN, MRN (Medical Record Number), address, phone number, email, admission and discharge dates, and even photos. If a data point could identify the patient in context, it is PHI."

- cat: HIPAA
  q: "What does the HCCH (Health Care Clearing House) actually do?"
  a: "Providers submit billing data in many non-standard formats. The HCCH translates all of it into HIPAA-compliant standardized electronic formats (like EDI 837) and forwards them to payers. Without the HCCH, every provider and every payer would need custom bilateral connections — thousands of integrations instead of one standardized hub."

- cat: HIPAA
  q: "Which four entities are legally bound by HIPAA?"
  a: "1. Health Care Providers (anyone who transmits health information electronically). 2. Health Plans (insurance companies, HMOs, government programs). 3. Health Care Clearing Houses (HCCH — process non-standard data). 4. Business Associates (any vendor that handles PHI on behalf of a covered entity — billing firms, IT vendors, transcription services)."

# ── PAYERS ────────────────────────────────────────────────────────────────────

- cat: Payers
  q: "Define Medicare Part A."
  a: "Medicare Part A is the hospital and inpatient coverage component of Original Medicare, covering stays of 24 hours or more — inpatient hospital care, SNF stays after a qualifying hospital admission, hospice, and some home health. It is premium-free for enrollees at age 65 who have paid 40 quarters (10 years) of US federal taxes. Stays under 24 hours are outpatient and fall under Part B instead."

- cat: Payers
  q: "Define Medicare Part B and what it uniquely covers."
  a: "Medicare Part B covers outpatient and medical services — physician visits, outpatient procedures under 24 hours, preventive care, and Durable Medical Equipment (DME). Unlike Part A, Part B requires a monthly premium and is an optional add-on. DME coverage (wheelchairs, walkers, hospital beds, prosthetics) is a distinctive feature of Part B not available under Part A."

- cat: Payers
  q: "What is MAPD and how is it formed?"
  a: "MAPD (Medicare Advantage Prescription Drug plan) is a bundled plan combining Medicare Part C (Medicare Advantage — which covers A+B+extras) with Part D (prescription drug coverage) into one commercial plan. It is administered by private insurers under a CMS contract. MAPD is designed for cost efficiency: one plan, one premium, all Medicare benefits plus pharmacy coverage."

- cat: Payers
  q: "What is No-Fault Liability insurance?"
  a: "No-Fault Liability (Third-Party Insurance) is an optional coverage that pays for medical care resulting from injury to a person or property damage in an accident, regardless of who caused it. It is called 'no-fault' because payment is triggered by the accident event, not fault determination. In billing, it often acts as primary payer for accident-related claims before health insurance contributes."

- cat: Payers
  q: "What is Workers' Compensation and when does it apply?"
  a: "Workers' Compensation is a government-mandated insurance program covering injuries or illnesses employees sustain on work premises or during active work hours, regardless of fault. It pays for medical treatment, lost wages, and rehabilitation. In billing, Workers' Comp is the primary payer for work-related claims — health insurance does not pay until Workers' Comp has been billed and has paid its portion first."

- cat: Payers
  q: "Why is Medicaid the 'payer of last resort'?"
  a: "Medicaid is funded for the most vulnerable populations and is designed to cover gaps — it only pays what other insurance did not. If a Medicaid member also has Medicare or an employer plan, those pay first. This prevents double-dipping and ensures Medicaid dollars stretch further for those who have no other coverage at all."

- cat: Payers
  q: "Can someone have both Medicare and Medicaid at the same time?"
  a: "Yes — they're called 'dual-eligible' members. Medicare pays first as primary; Medicaid pays second, often covering the 20% Medicare leaves behind. Dual members are typically elderly or disabled individuals who also fall below the federal poverty line. For a Customer Support Rep, dual members are a common case requiring careful COB handling."

- cat: Payers
  q: "What's the difference between Medicare Part C and original Medicare?"
  a: "Parts A and B are 'Original Medicare' — government-administered, standard benefits. Part C (Medicare Advantage) is run by private insurance companies approved by CMS. It must cover everything A+B covers but often adds dental, vision, hearing, gym memberships, and transportation. The trade-off: you are restricted to the plan's contracted network."

- cat: Payers
  q: "Why does Medicare cover ESRD patients regardless of age?"
  a: "End Stage Renal Disease — permanent kidney failure requiring dialysis or a transplant — is catastrophically expensive. Dialysis alone costs $70,000+ per year. Congress created the ESRD Medicare exception in 1972 so that financial ruin would not prevent access to life-sustaining treatment. It is the only condition-based Medicare qualifier; no other single diagnosis grants Medicare eligibility."

- cat: Payers
  q: "What's the difference between TRICARE and CHAMPVA?"
  a: "Both serve the military community, but for different groups. TRICARE (formerly CHAMPUS) covers active duty personnel, veterans, retirees, and their dependents — essentially anyone connected to current or past military service. CHAMPVA specifically covers veterans who are permanently and totally disabled due to service-connected conditions (or deceased from those conditions) and their dependents. CHAMPVA is run by the VA; TRICARE is run by the Department of Defense."

# ── MANAGED CARE ──────────────────────────────────────────────────────────────

- cat: ManagedCare
  q: "What is a managed care plan and what are its two non-negotiable rules?"
  a: "A managed care plan (HMO, PPO, EPO, or POS) controls costs by managing how and where members access care. For Medicare Advantage plans specifically, two rules are absolute: (1) an authorization or referral is always required before services are rendered, and (2) the member must always visit an In-Network (INN) provider. Violating either rule typically results in automatic claim denial."

- cat: ManagedCare
  q: "What is the purpose of a Prior Authorization in managed care?"
  a: "Prior Authorization (PA) is a designated permission a provider requests from the health care plan before performing a specific service on a member. It confirms the service is medically necessary, covered under the plan, and will be reimbursed. Without an approved PA, the claim is denied — even if the service was clinically correct — making missing authorization one of the top 3 causes of claim denial."

- cat: ManagedCare
  q: "Which plan types allow verbal referrals, and why does it matter?"
  a: "PPO and EPO plans allow verbal referrals — no formal written or system referral is required before a specialist visit. HMO and POS require a formal referral from the PCP on record. This matters in practice: an EPO member who books a specialist directly after a verbal mention to their PCP is compliant, whereas the same action in an HMO without a formal referral risks a denial."

- cat: ManagedCare
  q: "Why do HMOs cost less than PPOs?"
  a: "HMOs restrict you to a defined network and require PCP referrals, which limits expensive specialist visits and allows the plan to negotiate bulk rates with a smaller provider set. PPOs pay for any provider, so they cannot guarantee volumes to any one network — premiums are higher to offset the unpredictability of where members seek care."

- cat: ManagedCare
  q: "What's the practical difference between an EPO and an HMO?"
  a: "Both are in-network only. The key difference: an HMO requires a PCP referral to see a specialist; an EPO does not. An EPO gives you direct-access flexibility within the network. If you need a dermatologist, an EPO member can book directly — an HMO member must have their PCP refer them first."

- cat: ManagedCare
  q: "What happens if an HMO member goes out-of-network?"
  a: "Except in a genuine emergency, the HMO will not pay — the member is responsible for 100% of the bill. This is the core HMO trade-off: low premiums and predictable copays, but strict network discipline. Emergency exception: federal law (EMTALA) requires HMOs to cover emergency stabilization regardless of network."

- cat: ManagedCare
  q: "How is a POS plan different from a PPO if both allow out-of-network care?"
  a: "A PPO requires no referral for either in-network or out-of-network visits — complete flexibility. A POS requires a PCP referral to see in-network specialists (like an HMO) but also allows out-of-network access at a higher cost (like a PPO). Think of POS as the hybrid: HMO discipline in-network, PPO flexibility as a fallback."

# ── PROVIDERS ─────────────────────────────────────────────────────────────────

- cat: Providers
  q: "What is the difference between an Individual Provider and a Facility Provider?"
  a: "Individual Providers are licensed clinicians who personally deliver care — the PCP (first point of contact and gatekeeper) and Specialists (referred by the PCP). Facility Providers are institutional settings where care is rendered: hospitals, SNFs, ASCs, Home Health agencies, and Hospice programs. Both types submit claims, but facility claims use the UB-04 form while professional claims use the CMS-1500."

- cat: Providers
  q: "What is a Hospice and how is it different from a hospital?"
  a: "Hospice is a care program for terminally ill patients — typically those with 6 months or less to live — providing comfort, pain management, and emotional support at home or in a home-like setting, not aggressive treatment. A hospital aims to treat and cure; hospice explicitly prioritizes comfort and dignity over cure. A member electing hospice under Medicare Part A must typically forgo curative coverage."

- cat: Providers
  q: "What is Home Health care?"
  a: "Home Health refers to licensed agencies that deliver skilled medical services — nursing care, physical therapy, wound care — at the patient's home or place of residence, based on a written physician plan of care. Unlike SNF care, no facility admission is required; the care comes to the patient. Medicare Part A (and Part B for some services) covers home health when a physician certifies medical necessity."

- cat: Providers
  q: "What is an ASC (Ambulatory Surgical Center)?"
  a: "An ASC is a same-day surgery center — also called a Short Procedure Unit (SPU) — where patients undergo planned surgical procedures and are discharged on the same day. Unlike a hospital, an ASC does not provide inpatient stays. The POS code for an ASC is 24. Common ASC procedures include cataract surgery, colonoscopy, and minor orthopaedic repairs."

- cat: Providers
  q: "Why do providers have both an NPI and a TIN — what's the difference?"
  a: "The NPI (10 digits) identifies the individual clinician across all HIPAA transactions — it is globally unique per person and used to route the claim to the correct provider. The TIN (9 digits) identifies the tax entity — the organization or practice — that receives the payment. A hospital with 200 physicians has 200 NPIs but potentially one TIN. NPI answers 'who performed the service'; TIN answers 'where does the money go.'"

- cat: Providers
  q: "What's the difference between a Referral and a Prior Authorization?"
  a: "A referral is the first authorization — a PCP introducing a member to a specialist for the first time. Once that specialist relationship is established, any subsequent procedure the specialist wants to perform requires a separate prior authorization. Referral = 'go see this specialist.' Authorization = 'proceed with this specific service on this date.'"

- cat: Providers
  q: "Why would a provider prefer capitation over fee-for-service?"
  a: "Capitation provides guaranteed monthly revenue regardless of visit volume — predictable cash flow, no billing delays. It also rewards preventive care: keep your panel healthy, and you profit. The risk: if your panel gets sick frequently, you deliver more care for the same fixed payment. FFS is the inverse — more procedures equals more revenue, but also more billing overhead and zero revenue on non-visit months."

- cat: Providers
  q: "What is an NPI and why does it matter on a claim?"
  a: "The National Provider Identifier is a unique 10-digit number assigned to every individual clinician. It is the standard identifier on HIPAA electronic transactions — without a valid NPI on the claim, the payer cannot route payment to the right provider. Group practices also have organizational NPIs distinct from each individual clinician's NPI."

- cat: Providers
  q: "What are the four ways to initiate an authorization?"
  a: "1. Phone call — call the payer's authorization line directly. 2. Online portal — submit through the payer's web portal. 3. PA Form (Prior Authorization Form) — fax or mail the completed form. 4. E-Fax — send the form electronically via a HIPAA-compliant fax service. The payer determines which methods they accept; phone and portal are the most common for urgent requests."

# ── CODING ────────────────────────────────────────────────────────────────────

- cat: Coding
  q: "What is an ICD code and what does it represent on a claim?"
  a: "An ICD (International Classification of Disease) code is an alphanumeric code representing the patient's medical diagnosis — the condition, disease, or symptom that made the service necessary. ICD answers 'why was this done?' Every claim must include at least one ICD code to medically justify the procedure billed. Examples: E11.22 = Type 2 diabetes with chronic kidney disease; R51 = Headache."

- cat: Coding
  q: "What is a HCPCS code, how is it pronounced, and what does it cover?"
  a: "HCPCS (pronounced 'Hikpik') — Healthcare Common Procedure Coding System — uses 5-character alphanumeric codes (one letter + four digits, e.g. E0265) to bill Durable Medical Equipment, ambulance services, orthotics, prosthetics, and miscellaneous supplies not covered by CPT. Maintained by CMS (not the AMA like CPT), HCPCS is primarily used for Part B and DME-related claims."

- cat: Coding
  q: "What is a Place of Service (POS) code and why is it on every professional claim?"
  a: "A POS code is a 2-digit numeric code that specifies where a medical service was rendered. It is mandatory on professional claims (CMS-1500) because the same procedure can reimburse differently depending on the setting — an office visit pays differently than the same visit in a hospital. Common POS codes: 11 = Office, 12 = Home, 21 = Inpatient Hospital, 22 = Outpatient Hospital, 24 = ASC."

- cat: Coding
  q: "What is the difference between a Level 1 Modifier and a Level 2 Modifier?"
  a: "A Modifier is a 2-character alphanumeric code appended to a procedure code to add clinical detail without changing its core definition. Level 1 Modifiers attach to CPT codes — e.g. RT (right side on a CPT procedure). Level 2 Modifiers attach to HCPCS codes — e.g. LT (left side on a DME item). Common modifiers RT, LT, and 50 (bilateral) can apply at both levels depending on the base code."

- cat: Coding
  q: "Why are there multiple code sets (CPT, ICD, HCPCS)? Can't one system cover everything?"
  a: "Each code set answers a different claim dimension. CPT answers 'what was done' (procedure). ICD answers 'why was it done' (diagnosis). HCPCS answers 'what was supplied' (equipment and drugs not in CPT). A claim for a diabetic patient receiving a wheelchair would combine ICD (E11.x), HCPCS (E0301), and possibly CPT if a provider also performed a service. Together, they give the payer a complete clinical and financial picture."

- cat: Coding
  q: "What's the purpose of a Modifier on a CPT code?"
  a: "Modifiers add specificity without creating a new code. Common examples: RT (right side), LT (left side), 50 (bilateral procedure), 59 (distinct procedural service). Without modifiers, a payer might deny two simultaneous procedures as a duplicate when they are actually distinct. Modifiers prevent unnecessary denials and ensure accurate reimbursement."

- cat: Coding
  q: "What do E/M codes (99202–99215) represent?"
  a: "Evaluation and Management codes are CPT codes billed for office visits — the most common claim type in primary care. New patient visits use 99202–99205 (higher complexity = higher code). Established patient visits use 99212–99215. The code level is determined by medical decision complexity and/or total time spent. E/M codes are among the most frequently audited by payers."

# ── CLAIMS ────────────────────────────────────────────────────────────────────

- cat: Claims
  q: "What is Adjudication?"
  a: "Adjudication is the automated or manual process a payer uses to evaluate a submitted claim and determine whether to pay, partially pay, or deny it. The adjudication engine checks eligibility, authorization, timely filing, coding accuracy, and coordination of benefits before making a decision. The result is communicated to the provider via an EOB or ERA, and to the member via an EOB."

- cat: Claims
  q: "What is an Appeal in medical billing and who can file one?"
  a: "An Appeal is a formal reconsideration request submitted by a provider or a member to a health care plan, asking them to reverse a denied claim or authorization. Both providers and members have the legal right to appeal — either party can challenge a denial. The plan either reverses it (claim is then paid) or upholds it (denial stands). Appeals are the primary remedy for the three classic administrative denials."

- cat: Claims
  q: "What is the Date of Service (DOS) and why is it critical on a claim?"
  a: "The Date of Service is the actual date on which a medical service was performed. Payers use DOS to verify whether the member had active coverage — not the billing date, not the date the appointment was booked. If the DOS falls outside the member's active coverage period, the claim is denied for 'no active insurance on Date of Service' (Denial Reason #2). TFL deadlines also run from the DOS."

- cat: Claims
  q: "What is a write-off in the RCM context?"
  a: "A write-off is an accounts receivable adjustment made when a denied or underpaid claim cannot be recovered — appeal rights exhausted, TFL lapsed, or a contractual adjustment required. The uncollectable amount is removed from AR. Excessive write-offs are a red flag: they signal systemic failures in coding, authorization, or timely filing processes that are costing the provider revenue."

- cat: Claims
  q: "What are the three most common reasons a claim gets denied?"
  a: "1. Filed after the Timely Filing Limit — the claim arrived too late per the payer's deadline. 2. No active insurance on the Date of Service — coverage had lapsed or not yet started. 3. No authorization obtained before the service — the procedure needed pre-approval that was never secured. All three are administrative denials, not clinical — they are entirely preventable."

- cat: Claims
  q: "What's the difference between an EOB and an ERA?"
  a: "Same information, two formats. An EOB (Explanation of Benefits) is a human-readable document showing what was paid, denied, or adjusted — sent to both provider and member. An ERA (Electronic Remittance Advice) is the machine-readable version (EDI 835 format) sent to the provider's billing system for automated payment posting. Think: EOB for people, ERA for computers."

- cat: Claims
  q: "How does COB (Coordination of Benefits) work in practice?"
  a: "When a member has two plans, COB rules determine primary (pays first) and secondary (pays the remainder). The primary payer processes the claim first at its contracted rate. The secondary payer then receives the claim with primary payment data and covers some or all of the remaining balance. The member's responsibility is what is left after both payers have processed."

- cat: Claims
  q: "What is the difference between TFL and TAT?"
  a: "TFL (Timely Filing Limit) is the provider's deadline — how long they have to submit a claim from the date of service. TAT (Turn Around Time) is the payer's obligation — how long they have to respond after receiving the claim. Missing the TFL costs the provider the claim. TAT delays are the payer's problem; providers can escalate or appeal if TAT is breached."

# ── PATIENT RESPONSIBILITY ────────────────────────────────────────────────────

- cat: PatientResp
  q: "What are the three components of Patient Responsibility (PR)?"
  a: "Patient Responsibility is the ~20% of covered medical costs the member must pay. PR-1 (Deductible) — a fixed annual threshold paid entirely by the member before insurance contributes. PR-2 (Co-insurance) — a percentage split after the deductible is met (e.g. 20%), with the exact dollar amount known only after adjudication. PR-3 (Co-pay) — a fixed per-visit dollar amount paid upfront at service, often regardless of deductible status."

- cat: PatientResp
  q: "What is the Deductible (PR-1) and when does it reset?"
  a: "The Deductible is a fixed annual dollar amount the member must pay entirely out-of-pocket before the insurance plan starts sharing costs. Until the deductible is fully met, the member pays 100% of covered charges. Once met, co-insurance (PR-2) applies. The deductible resets on January 1 of each calendar year — every new plan year restarts the counter at zero."

- cat: PatientResp
  q: "What is the OOP Maximum and what happens when it is reached?"
  a: "The Out-of-Pocket Maximum is the total annual ceiling on what a member spends on covered services: Deductible (PR-1) + Co-insurance (PR-2) + Co-pay (PR-3) + non-covered charges. Once the OOP maximum is reached, the insurance covers 100% of covered services for the remainder of the calendar year — the member pays nothing further until the OOP resets on January 1."

- cat: PatientResp
  q: "What's the difference between a copay and co-insurance?"
  a: "A copay is a fixed, known amount paid up-front at service time — $20 for a PCP visit, $50 for a specialist. It does not change based on total cost. Co-insurance is a percentage split you do not know the exact dollar amount of until after the claim is processed — e.g., you owe 20% of the allowed amount, which could be $40 or $400 depending on the procedure."

- cat: PatientResp
  q: "Once the deductible is met, is the member done paying?"
  a: "No. After the deductible, the member typically enters a co-insurance phase — they still owe a percentage of costs (commonly 20%). They stop paying altogether only once they hit the Out-of-Pocket Maximum, which combines deductible + co-insurance + copays. After the OOP max, insurance covers 100% for the rest of the plan year."

- cat: PatientResp
  q: "Why do some services skip the deductible and just require a copay?"
  a: "Insurers intentionally waive the deductible for high-value preventive services (annual checkups, immunizations, cancer screenings) to lower the financial barrier to using them. The logic: paying a $20 preventive visit copay now is far cheaper for the plan than covering an undetected disease treated at full cost two years later. The ACA (Affordable Care Act) mandates this for a defined set of preventive services."

- cat: PatientResp
  q: "What is 'balance billing' and when does it apply?"
  a: "Balance billing occurs when an out-of-network provider charges the patient the difference between their full billed rate and whatever the payer paid. Example: provider charges $500, payer pays $300 (their OON rate), provider bills the patient $200 — the balance. In-network providers cannot balance-bill because they agreed to accept the payer's contracted rate as payment in full. Balance billing is why OON care is always more expensive and riskier."
