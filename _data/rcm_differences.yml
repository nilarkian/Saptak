# RCM Differences — source for /notes/rcm/differences
# Side-by-side comparison of confusable pairs. One card per comparison.
# Schema:
#   id:      stable unique string
#   cat:     Participants | HIPAA | Payers | ManagedCare | Providers | Coding | Claims | PatientResp
#   title:   "A vs B" — shown as card heading
#   a_label: left column header
#   b_label: right column header
#   rows:    list of {dim, a, b}  — dim = attribute being compared
#   tip:     mnemonic or memory hook shown at card footer
# To add: append an entry. Rebuild Jekyll → appears immediately.

# ── PAYERS ────────────────────────────────────────────────────────────────────

- id: diff-medicare-medicaid
  cat: Payers
  title: "Medicare vs Medicaid"
  a_label: "Medicare"
  b_label: "Medicaid"
  rows:
    - dim: "Administered by"
      a: "Federal government (CMS)"
      b: "State-supervised, federally funded & monitored"
    - dim: "Who qualifies"
      a: "65+ · disabled (24+ mo SSI) · ESRD · 40 qtrs tax paid"
      b: "Below federal poverty line · disabled · pregnant · children (no age limit)"
    - dim: "Coverage %"
      a: "80% of covered charges"
      b: "100% of covered charges"
    - dim: "Payer order"
      a: "Primary (pays first)"
      b: "Last resort (pays after ALL other payers)"
    - dim: "Income-based?"
      a: "No"
      b: "Yes — must be below poverty line"
    - dim: "Who keeps it running"
      a: "Federal government only"
      b: "State + Federal government jointly"
  tip: "Memory hook: Medicare = age 65+ (Medicare sounds like 'Medical Care for elders'). Medicaid = means-tested (Medicaid sounds like 'Medical Aid for those in need')."

- id: diff-part-a-b
  cat: Payers
  title: "Medicare Part A vs Part B"
  a_label: "Part A — Hospital"
  b_label: "Part B — Medical/Outpatient"
  rows:
    - dim: "What it covers"
      a: "Inpatient hospital stays (24+ hrs) · SNF · Hospice · Home health"
      b: "Outpatient visits · physician services · DME · preventive care"
    - dim: "Stay duration threshold"
      a: "24 hours or more (admitted)"
      b: "Less than 24 hours (not admitted)"
    - dim: "Premium at 65+"
      a: "Free if 40+ quarters of US taxes paid"
      b: "Monthly premium required — optional enrollment"
    - dim: "DME (wheelchairs, walkers)"
      a: "Not covered"
      b: "Covered under Part B"
    - dim: "Enrollment"
      a: "Automatic at 65+"
      b: "Must actively enroll (opt-in)"
  tip: "A = Admitted (inpatient, 24+ hrs). B = Beyond the hospital (outpatient + doctor visits)."

# ── MANAGED CARE ──────────────────────────────────────────────────────────────

- id: diff-hmo-ppo
  cat: ManagedCare
  title: "HMO vs PPO"
  a_label: "HMO"
  b_label: "PPO"
  rows:
    - dim: "Network restriction"
      a: "In-network ONLY"
      b: "In- or out-of-network allowed"
    - dim: "PCP referral required?"
      a: "YES — must see PCP first"
      b: "NO — direct specialist access"
    - dim: "Out-of-network coverage"
      a: "None (except emergencies)"
      b: "Covered at higher cost-share"
    - dim: "Premium cost"
      a: "Lower"
      b: "Higher"
    - dim: "Flexibility"
      a: "Low — network + referral constraints"
      b: "High — any provider, no referral"
    - dim: "Best for"
      a: "Cost-conscious members who prefer predictable care"
      b: "Members needing specialist flexibility"
  tip: "HMO = 'H for Hoops' — you jump through referral hoops. PPO = 'P for Pick anyone'."

- id: diff-epo-pos
  cat: ManagedCare
  title: "EPO vs POS"
  a_label: "EPO"
  b_label: "POS"
  rows:
    - dim: "Network restriction"
      a: "In-network ONLY"
      b: "In-network preferred; OON allowed at higher cost"
    - dim: "PCP referral required?"
      a: "NO — direct specialist access"
      b: "YES — for in-network specialist visits"
    - dim: "Out-of-network coverage"
      a: "None (except emergencies)"
      b: "Covered at higher cost-share"
    - dim: "HMO similarity"
      a: "Same network rule; no referral"
      b: "Same referral rule; OON allowed"
    - dim: "Best for"
      a: "Members wanting INN-only simplicity without referral hassle"
      b: "Members wanting flexibility with some HMO structure"
  tip: "EPO = HMO without the referral. POS = PPO with the referral. Cross the two features."

# ── PROVIDERS ─────────────────────────────────────────────────────────────────

- id: diff-referral-auth
  cat: Providers
  title: "Referral vs Authorization"
  a_label: "Referral"
  b_label: "Authorization (Prior Auth)"
  rows:
    - dim: "Who initiates"
      a: "PCP — sends member to a specialist"
      b: "Specialist or facility — requests approval to perform a service"
    - dim: "When used"
      a: "First contact with a new specialist"
      b: "Before a specific procedure or ongoing treatment"
    - dim: "Required by"
      a: "HMO and POS plans"
      b: "Most managed care plans for high-cost or complex services"
    - dim: "Think of it as"
      a: "Permission to visit"
      b: "Permission to act / perform the service"
    - dim: "Phone call type"
      a: "Referral call (PCP to insurance)"
      b: "Authorization call (specialist to insurance)"
  tip: "Referral = Go see someone. Authorization = Do something to them."

- id: diff-capitation-ffs
  cat: Providers
  title: "Capitation vs Fee-for-Service"
  a_label: "Capitation"
  b_label: "Fee-for-Service (FFS)"
  rows:
    - dim: "Payment structure"
      a: "Fixed PMPM (per-member-per-month) fee"
      b: "Paid separately for each service rendered"
    - dim: "Revenue tied to"
      a: "Panel size (number of enrolled members)"
      b: "Volume of services performed"
    - dim: "Core incentive"
      a: "Keep patients healthy — fewer visits = more profit"
      b: "More procedures = more revenue"
    - dim: "Revenue predictability"
      a: "High — guaranteed monthly"
      b: "Low — depends on patient volume"
    - dim: "Financial risk bearer"
      a: "Provider (sick panel costs more to serve)"
      b: "Payer (pays for every individual service)"
    - dim: "Best for"
      a: "Primary care, preventive-focused practices"
      b: "Specialists and procedure-heavy practices"
  tip: "Capitation = a monthly 'cap' fee regardless of visits. FFS = 'For every Service' you bill separately."

- id: diff-inn-oon
  cat: Providers
  title: "In-Network (INN) vs Out-of-Network (OON)"
  a_label: "In-Network (INN)"
  b_label: "Out-of-Network (OON)"
  rows:
    - dim: "Contract with payer?"
      a: "YES — participating provider"
      b: "NO — non-participating provider"
    - dim: "Negotiated rate?"
      a: "Yes — discounted allowed amount agreed upfront"
      b: "No — provider may bill full charges"
    - dim: "Member cost-share"
      a: "Lower — copay/coinsurance at contracted rate"
      b: "Higher — balance billing possible"
    - dim: "HMO / EPO coverage"
      a: "Covered"
      b: "NOT covered (except emergencies)"
    - dim: "PPO coverage"
      a: "Covered at best rate"
      b: "Covered at higher rate — member pays more"
    - dim: "Balance billing risk"
      a: "None — provider accepts contracted rate as payment in full"
      b: "Yes — provider can bill member the difference"
  tip: "INN = Inside the deal. OON = Outside the deal — always costs more."

# ── CODING ────────────────────────────────────────────────────────────────────

- id: diff-cpt-icd
  cat: Coding
  title: "CPT vs ICD"
  a_label: "CPT"
  b_label: "ICD / ICD-10"
  rows:
    - dim: "Core question answered"
      a: "What was DONE? (procedure/service)"
      b: "What does the patient HAVE? (diagnosis/condition)"
    - dim: "Code format"
      a: "5-digit numeric (e.g. 10040, 99213)"
      b: "Alphanumeric (e.g. E11.22, R51)"
    - dim: "Maintained by"
      a: "AMA (American Medical Association)"
      b: "WHO / adapted by CMS for US billing"
    - dim: "Examples"
      a: "66984 = cataract surgery · 99213 = office visit"
      b: "E11.22 = type 2 diabetes · R51 = headache"
    - dim: "Role on a claim"
      a: "Procedure line items — what is being billed"
      b: "Diagnosis codes — why the procedure was needed"
  tip: "CPT = 'C for Cut' (what was done / procedure). ICD = 'I for Illness' (diagnosis)."

# ── CLAIMS ────────────────────────────────────────────────────────────────────

- id: diff-npi-tin
  cat: Claims
  title: "NPI vs TIN"
  a_label: "NPI"
  b_label: "TIN"
  rows:
    - dim: "Full name"
      a: "National Provider Identifier"
      b: "Tax Identification Number"
    - dim: "Purpose"
      a: "Identifies the individual clinician for HIPAA transactions"
      b: "Identifies the organization/group for tax and payment routing"
    - dim: "Number of digits"
      a: "10 digits"
      b: "9 digits"
    - dim: "Assigned by"
      a: "CMS (Centers for Medicare & Medicaid Services)"
      b: "IRS (Internal Revenue Service)"
    - dim: "Scope"
      a: "One per individual clinician — globally unique"
      b: "One per organization — shared by all providers in the group"
    - dim: "Used for"
      a: "Claim routing — who performed the service"
      b: "Payment posting — where the money goes"
  tip: "NPI = the individual clinician's ID badge. TIN = the organization's tax number."

- id: diff-tfl-tat
  cat: Claims
  title: "TFL vs TAT"
  a_label: "TFL — Timely Filing Limit"
  b_label: "TAT — Turn Around Time"
  rows:
    - dim: "What it measures"
      a: "How long the provider has to SUBMIT the claim"
      b: "How long the payer takes to DECIDE on the claim"
    - dim: "Set by"
      a: "Payer (each plan has its own — e.g. 90 days or 1 year from DOS)"
      b: "Payer and/or state regulations"
    - dim: "Consequence of missing"
      a: "Automatic denial — limited appeal rights"
      b: "N/A for providers — TAT is the payer's obligation"
    - dim: "Direction"
      a: "Provider to Payer (incoming deadline)"
      b: "Payer to Provider (outgoing obligation)"
    - dim: "Who bears the risk"
      a: "Provider — loses revenue if filed late"
      b: "Payer — must respond within their TAT window"
  tip: "TFL clock starts when the service is rendered. TAT clock starts when the claim is received."

- id: diff-eob-era
  cat: Claims
  title: "EOB vs ERA"
  a_label: "EOB — Explanation of Benefits"
  b_label: "ERA — Electronic Remittance Advice"
  rows:
    - dim: "Format"
      a: "Human-readable document (paper or portal PDF)"
      b: "Machine-readable EDI 835 electronic file"
    - dim: "Sent to"
      a: "Provider AND member"
      b: "Provider's billing system only"
    - dim: "Purpose"
      a: "Explain what was paid, denied, or adjusted — for humans"
      b: "Automate payment posting in the billing/EHR system"
    - dim: "Content"
      a: "Same claim decision data"
      b: "Same claim decision data"
    - dim: "Primary audience"
      a: "Billing staff and patients"
      b: "Billing software / EHR systems"
  tip: "Same data, two audiences: EOB for people, ERA for computers."

# ── PATIENT RESPONSIBILITY ────────────────────────────────────────────────────

- id: diff-deductible-coinsurance-copay
  cat: PatientResp
  title: "Deductible vs Co-insurance vs Copay"
  a_label: "Deductible (PR-1)"
  b_label: "Co-insurance (PR-2)"
  rows:
    - dim: "What it is"
      a: "Fixed annual amount member pays before insurance pays anything"
      b: "Percentage split after deductible is met"
    - dim: "Amount known upfront?"
      a: "Yes — stated in plan documents"
      b: "Percentage known; dollar amount only after claim adjudication"
    - dim: "When it applies"
      a: "Start of plan year until met"
      b: "After deductible — until OOP max is reached"
    - dim: "PR code"
      a: "PR-1"
      b: "PR-2 (Copay = PR-3)"
    - dim: "Example"
      a: "$1,500 deductible: member pays first $1,500 of costs each year"
      b: "20% coinsurance: member pays 20% of allowed amount per claim"
    - dim: "Variable?"
      a: "Fixed dollar amount (predictable)"
      b: "Variable dollar amount (depends on total service cost)"
  tip: "Payment order: Deductible first, then Co-insurance, then OOP max. Copay (PR-3) often applies at each visit regardless of deductible status."

# ── HIPAA ─────────────────────────────────────────────────────────────────────

- id: diff-phi-hipaa
  cat: HIPAA
  title: "PHI vs HIPAA"
  a_label: "PHI — the data"
  b_label: "HIPAA — the law"
  rows:
    - dim: "What it is"
      a: "The actual protected health information about a member"
      b: "Federal privacy law enacted to protect PHI"
    - dim: "Enacted / defined"
      a: "Defined within HIPAA itself"
      b: "Enacted 1996 by DHHS (Dept. of Health & Human Services)"
    - dim: "Examples"
      a: "Name · DOB · SSN · MRN · Address · Phone · Photos · Admission/discharge/death dates"
      b: "Not a data type — it's a law with compliance rules"
    - dim: "Who must protect it"
      a: "All 4 HIPAA-covered entities (providers, plans, HCCH, business associates)"
      b: "Applies to: Health Care Providers · Health Plans · HCCH · Business Associates"
    - dim: "What happens if violated"
      a: "Member privacy is compromised — identity theft, discrimination risk"
      b: "Entity faces civil/criminal penalties under HIPAA enforcement"
  tip: "PHI is the treasure. HIPAA is the vault. One is the sensitive data; the other is the rule protecting it."

# ── PARTICIPANTS ──────────────────────────────────────────────────────────────

- id: diff-pcp-specialist
  cat: Participants
  title: "PCP vs Specialist"
  a_label: "PCP — Primary Care Physician"
  b_label: "Specialist"
  rows:
    - dim: "Role"
      a: "First point of contact (1st POC) — gatekeeper to the rest of the system"
      b: "Provides focused expert care in one medical area"
    - dim: "How member accesses"
      a: "Directly — first visit, no referral needed to see PCP"
      b: "Via referral from PCP (in HMO/POS); directly in PPO/EPO"
    - dim: "Authorization call type"
      a: "PCP calls insurance for a referral → CPT range 9920x"
      b: "Specialist calls insurance for authorization → CPT range 9921x"
    - dim: "Examples"
      a: "Family medicine, internal medicine, pediatrician"
      b: "Cardiologist, orthopedist, neurologist, oncologist"
    - dim: "Required by plan type"
      a: "Required as gatekeeper in HMO and POS plans"
      b: "Accessed directly (no PCP needed) in PPO and EPO"
  tip: "PCP = the front door. Specialist = a room further inside. HMO makes you use the front door first."

# ── PAYERS (additional) ───────────────────────────────────────────────────────

- id: diff-part-c-d
  cat: Payers
  title: "Medicare Part C vs Part D"
  a_label: "Part C — Medicare Advantage"
  b_label: "Part D — Prescription Drug Plan"
  rows:
    - dim: "What it covers"
      a: "Part A + Part B + extras (dental, vision, hearing, gym, transport)"
      b: "Prescription drugs and vaccines only"
    - dim: "Who administers"
      a: "Private insurers under Medicare contract"
      b: "Private insurers under Medicare contract (standalone or bundled)"
    - dim: "Enrollment"
      a: "Optional add-on replacing original Medicare — member picks a private MA plan"
      b: "Optional add-on — standalone PDP or bundled into Part C (MAPD)"
    - dim: "Bundles into MAPD?"
      a: "YES — Part C is the base of MAPD"
      b: "YES — Part D + Part C = MAPD (Medicare Advantage Prescription Drug)"
    - dim: "Also known as"
      a: "MA Plan · Medicare Advantage · Managed Care Plan"
      b: "PDP · Prescription Drug Plan"
  tip: "MAPD = Part C + Part D combined. Think: C wraps everything, D adds the drugs."

- id: diff-tricare-champva
  cat: Payers
  title: "TRICARE vs CHAMPVA"
  a_label: "TRICARE (fmr. CHAMPUS)"
  b_label: "CHAMPVA"
  rows:
    - dim: "Who it covers"
      a: "Military personnel — active duty, deceased, disabled, retirees — and their dependents"
      b: "War veterans — active, deceased, disabled or partially disabled during war — and their dependents"
    - dim: "Administered by"
      a: "Dept. of Defense (DoD)"
      b: "Dept. of Veterans Affairs (VA)"
    - dim: "Former name"
      a: "CHAMPUS — Civilian Health And Medical Program of the Uniformed Services"
      b: "Civilian Health And Medical Program of the Department of Veterans Affairs"
    - dim: "Key distinction"
      a: "Uniformed Services = active military branches"
      b: "Veterans Affairs = veterans of past wars"
    - dim: "Coverage type"
      a: "Full health coverage with network structure"
      b: "Health-benefit program for VA-eligible veterans and families"
  tip: "TRICARE = military in uniform (DoD). CHAMPVA = Veterans Affairs (VA). The A in CHAMPVA = Affairs."

# ── MANAGED CARE (additional) ─────────────────────────────────────────────────

- id: diff-hmo-epo
  cat: ManagedCare
  title: "HMO vs EPO"
  a_label: "HMO"
  b_label: "EPO"
  rows:
    - dim: "Network restriction"
      a: "In-network ONLY"
      b: "In-network ONLY — same rule as HMO"
    - dim: "PCP referral required?"
      a: "YES — must see PCP first to get to specialist"
      b: "NO — direct specialist access, no referral needed"
    - dim: "OON coverage"
      a: "None (except true emergencies)"
      b: "None — EPO will not cover OON specialists under any circumstance"
    - dim: "Cost tier"
      a: "Lower — locked-in plan with referral controls"
      b: "Lower — similar savings but with referral freedom"
    - dim: "Verbal referral allowed?"
      a: "No — formal written/system referral required"
      b: "Yes — verbal referrals are permitted"
    - dim: "Key difference"
      a: "Referral required to see specialist"
      b: "No referral — go directly to INN specialist"
  tip: "HMO and EPO are both INN-only prisons — EPO just removed the referral guard at the gate."

# ── PROVIDERS (additional) ────────────────────────────────────────────────────

- id: diff-hospital-snf
  cat: Providers
  title: "Hospital vs SNF"
  a_label: "Hospital"
  b_label: "SNF — Skilled Nursing Facility"
  rows:
    - dim: "Primary purpose"
      a: "Acute care — diagnosis, treatment, surgery, emergency"
      b: "Post-acute recovery — rehabilitation after a hospital stay"
    - dim: "Stay type"
      a: "Inpatient (≥24 hrs) or outpatient (<24 hrs)"
      b: "Extended stay — recovery period after discharge from hospital"
    - dim: "Services"
      a: "Surgery, diagnostics, emergency care, specialist consults"
      b: "Skilled nursing + ADL (Activities of Daily Living): bathing, cooking, occupational therapy"
    - dim: "Patient condition"
      a: "Acutely ill — needs immediate medical intervention"
      b: "Medically stable — needs continued skilled care or therapy"
    - dim: "Also called"
      a: "Hospital (inpatient facility)"
      b: "Recovery Center · Nursing Home (skilled level)"
  tip: "Hospital = fix the acute problem. SNF = recover after it's been fixed."

- id: diff-snf-hospice
  cat: Providers
  title: "SNF vs Hospice"
  a_label: "SNF — Skilled Nursing Facility"
  b_label: "Hospice"
  rows:
    - dim: "Goal of care"
      a: "Rehabilitation and recovery — goal is to improve and discharge"
      b: "Comfort and dignity — goal is quality of remaining life, not cure"
    - dim: "Patient condition"
      a: "Recovering from surgery or illness — expected to improve"
      b: "Terminally ill — life expectancy typically 6 months or less"
    - dim: "Location"
      a: "Dedicated SNF facility"
      b: "Member's home or home-like setting (can also be a hospice facility)"
    - dim: "Services"
      a: "Skilled nursing + ADL support + occupational/physical therapy"
      b: "Pain management · comfort care · emotional/spiritual support for member and family"
    - dim: "Insurance coverage"
      a: "Medicare Part A (after qualifying hospital stay)"
      b: "Medicare Part A (member must forgo curative treatment)"
  tip: "SNF = getting better. Hospice = getting comfortable. Opposite goals, both covered by Part A."

# ── CODING (additional) ───────────────────────────────────────────────────────

- id: diff-cpt-hcpcs
  cat: Coding
  title: "CPT vs HCPCS"
  a_label: "CPT"
  b_label: "HCPCS (Hikpik)"
  rows:
    - dim: "What it codes"
      a: "Medical procedures, services, and treatments performed by a provider"
      b: "DME, medical supplies, ambulance, orthotics, and misc. items not in CPT"
    - dim: "Code format"
      a: "5-digit numeric (e.g. 99213, 10040)"
      b: "1 letter + 4 digits, 5 alphanumeric total (e.g. E0265, A0021)"
    - dim: "Level"
      a: "Level 1 — primary procedure code on the claim"
      b: "Level 2 — equipment and supply codes; Modifier at Level 2 clarifies HCPCS"
    - dim: "Maintained by"
      a: "AMA (American Medical Association)"
      b: "CMS (Centers for Medicare & Medicaid Services)"
    - dim: "Examples"
      a: "99213 = office visit · 66984 = cataract surgery · 10040 = acne surgery"
      b: "E0265 = hospital bed · A0021 = ambulance · A5500 = diabetic shoes"
    - dim: "Modifier relationship"
      a: "Modifier Level 1 attaches to CPT codes"
      b: "Modifier Level 2 attaches to HCPCS codes"
  tip: "CPT = what the doctor DID. HCPCS = what equipment/supplies were USED. Both go on the claim."

# ── CLAIMS (additional) ───────────────────────────────────────────────────────

- id: diff-cob-eob
  cat: Claims
  title: "COB vs EOB"
  a_label: "COB — Coordination of Benefits"
  b_label: "EOB — Explanation of Benefits"
  rows:
    - dim: "What it is"
      a: "A process — determines payer priority when member has multiple insurances"
      b: "A document — explains how a specific claim was adjudicated"
    - dim: "When it happens"
      a: "At the time of claim processing — before payment is made"
      b: "After adjudication — once the claim decision is finalized"
    - dim: "Who uses it"
      a: "Payers — to coordinate among themselves so no duplicate payment occurs"
      b: "Provider AND member — both receive a copy of the EOB"
    - dim: "Output"
      a: "Determined payer order: primary → secondary → tertiary → patient"
      b: "Document showing: billed / allowed / paid / patient responsibility / denial reason"
    - dim: "Is it a bill?"
      a: "No — it's an internal coordination mechanism between payers"
      b: "NO — EOB is explicitly not a bill; it's a statement of what happened"
  tip: "COB decides WHO pays. EOB documents WHAT was paid. Process vs. paperwork."

# ── PATIENT RESPONSIBILITY (additional) ──────────────────────────────────────

- id: diff-copay-coinsurance
  cat: PatientResp
  title: "Co-pay vs Co-insurance"
  a_label: "Co-pay (PR-3)"
  b_label: "Co-insurance (PR-2)"
  rows:
    - dim: "Format"
      a: "Fixed dollar amount — same every time"
      b: "Percentage of allowed amount — varies by claim"
    - dim: "When you know the amount"
      a: "Upfront — printed on the member's insurance card"
      b: "Only after the claim is processed and adjudicated"
    - dim: "When it's paid"
      a: "At time of service — before or during the visit"
      b: "After adjudication — billed by provider from EOB"
    - dim: "Deductible dependency"
      a: "Usually applies regardless of deductible status"
      b: "Applies only after the deductible has been met"
    - dim: "Example"
      a: "$30 co-pay every specialist visit — same whether the bill is $100 or $5,000"
      b: "20% co-insurance on $1,000 claim = $200 member owes (payer pays $800)"
    - dim: "PR code"
      a: "PR-3"
      b: "PR-2 (Deductible = PR-1)"
  tip: "Co-pay = flat fee, know it now. Co-insurance = your % cut, know it later."
