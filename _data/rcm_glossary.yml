# RCM Glossary — source for acronym hover tooltips and dashboard glossary tab
# Each entry: term (displayed/matched), full (expansion), def (one-sentence definition)
# To add: append a new entry. Rebuild Jekyll → hovers appear on all topic:"RCM" notes.
# Match order: longest-first avoids ICD being matched before ICD-10. Order entries longest to shortest within overlapping prefixes.

- term: "ICD-10"
  full: "International Classification of Disease, 10th Revision"
  def: "Alphanumeric diagnosis codes (e.g. E11.22) used to represent medical conditions, diseases, or symptoms on a claim."

- term: "HCPCS"
  full: "Healthcare Common Procedure Coding System"
  def: "5-character alphanumeric codes (e.g. E0265) used to bill miscellaneous products and durable medical equipment not covered by CPT."

- term: "HIPAA"
  full: "Health Insurance Portability and Accountability Act"
  def: "Federal privacy law enacted in 1996 (by DHHS) requiring all members' identifiable health information to remain confidential and secure."

- term: "TRICARE"
  full: "Formerly CHAMPUS — Civilian Health And Medical Program of the Uniformed Services"
  def: "Health insurance for active, deceased, disabled, and retired military personnel and their dependents."

- term: "CHAMPVA"
  full: "Civilian Health And Medical Program of the Department of Veterans Affairs"
  def: "Health-benefit program covering care costs for war veterans (active, deceased, disabled, or partially disabled) and their dependents."

- term: "MAPD"
  full: "Medicare Advantage Prescription Drug plan"
  def: "A bundled plan that combines Medicare Part C (Medicare Advantage) and Part D (prescription drugs) into a single plan."

- term: "ESRD"
  full: "End Stage Renal Disease"
  def: "Permanent kidney failure requiring dialysis or a transplant; qualifies a patient for Medicare regardless of age."

- term: "HCCH"
  full: "Health Care Clearing House"
  def: "Organizations that receive non-standardized billing data from providers, standardize it, and forward it to payers for adjudication."

- term: "DHHS"
  full: "Department of Health and Human Services"
  def: "The US federal department that administers Medicare, Medicaid, and HIPAA regulations."

- term: "PHPM"
  full: "Per Head Per Month (also Per Member Per Month)"
  def: "The fixed monthly payment a provider receives under capitation, regardless of how many times the member is seen."

- term: "DME"
  full: "Durable Medical Equipment"
  def: "Medical equipment that can be rented or purchased for repeated home use (e.g. walkers, wheelchairs, hospital beds); billed under Medicare Part B."

- term: "CPT"
  full: "Current Procedural Terminology"
  def: "5-digit numeric codes (e.g. 10040) published by the AMA to describe medical procedures, services, or treatments on a claim."

- term: "ICD"
  full: "International Classification of Disease"
  def: "Alphanumeric codes used to represent the patient's medical condition, disease, or symptoms (e.g. R51 = Headache)."

- term: "NPI"
  full: "National Provider Identifier"
  def: "A unique 10-digit number assigned to every individual healthcare provider for use on all HIPAA-standard transactions."

- term: "TIN"
  full: "Tax Identification Number"
  def: "A 9-digit identifier shared by multiple providers within an organization, used for tax and billing purposes."

- term: "COB"
  full: "Coordination of Benefits"
  def: "The process of determining which payer is primary, secondary, or tertiary when a member has multiple insurance coverages."

- term: "EOB"
  full: "Explanation of Benefits"
  def: "A detailed summary of a processed claim sent by the insurance to both the provider and the member showing what was paid and what was denied."

- term: "PHI"
  full: "Protected Health Information"
  def: "Individually identifiable health information (name, DOB, SSN, MRN, etc.) that must be kept confidential under HIPAA."

- term: "OOP"
  full: "Out of Pocket"
  def: "The total annual ceiling on a member's spending (Deductible + Co-Insurance + Co-Pay + non-covered charges); once reached, insurance covers 100%."

- term: "TFL"
  full: "Timely Filing Limit"
  def: "The deadline set by an insurance plan within which a provider must submit a claim; missing it results in automatic denial."

- term: "TAT"
  full: "Turn Around Time"
  def: "The time interval the adjudication team takes to decide whether to pay, deny, or pend a claim (also applies to authorizations)."

- term: "PCP"
  full: "Primary Care Physician"
  def: "The member's first point of contact and gatekeeper; refers the member to specialists and initiates authorizations under HMO plans."

- term: "SNF"
  full: "Skilled Nursing Facility"
  def: "A recovery center providing post-surgical care and Activities of Daily Living (ADL) such as bathing, cooking, and occupational therapy."

- term: "ASC"
  full: "Ambulatory Surgical Center"
  def: "A same-day surgery center for short procedures (e.g. cataract surgery) where the patient is admitted and discharged the same day."

- term: "HMO"
  full: "Health Maintenance Organization"
  def: "A managed care plan requiring members to use in-network providers only and obtain a PCP referral before seeing specialists; generally lower cost."

- term: "PPO"
  full: "Preferred Provider Organization"
  def: "A managed care plan allowing members to see any provider (in- or out-of-network) without a referral; higher cost for out-of-network use."

- term: "EPO"
  full: "Exclusive Provider Organization"
  def: "A managed care plan similar to HMO (in-network only) but without requiring a PCP referral for specialists."

- term: "POS"
  full: "Point of Service (plan) / Place of Service (code)"
  def: "As a plan type: a hybrid HMO/PPO. As a 2-digit claim code: indicates where the medical service was rendered (e.g. 24=ASC, 12=Home)."

- term: "CMS"
  full: "Centers for Medicare & Medicaid Services"
  def: "The federal agency within DHHS that administers Medicare, Medicaid, CHIP, and the Health Insurance Marketplace."

- term: "RCM"
  full: "Revenue Cycle Management"
  def: "The end-to-end financial process healthcare organizations use to track patient care from registration through final payment."

- term: "FFS"
  full: "Fee for Service"
  def: "A payment model where providers are paid separately for each service rendered; the more procedures, the more revenue."

- term: "DOS"
  full: "Date of Service"
  def: "The date on which the medical service or procedure was actually performed; must fall within the member's active coverage period."

- term: "ADL"
  full: "Activities of Daily Living"
  def: "Everyday functions (bathing, dressing, eating, cooking) that SNFs help post-surgical patients regain and maintain."

- term: "ERA"
  full: "Electronic Remittance Advice"
  def: "An electronic version of the EOB sent from the payer to the provider's billing system, detailing payment decisions on submitted claims."

- term: "EDI"
  full: "Electronic Data Interchange"
  def: "The standard electronic format (e.g. 837P, 835) used to transmit healthcare claims and payment information between providers and payers."

- term: "INN"
  full: "In-Network"
  def: "A provider who has a contract with the payer (participating provider); members pay lower cost-sharing for in-network services."

- term: "OON"
  full: "Out-of-Network"
  def: "A provider without a contract with the payer (non-participating); members pay higher cost-sharing or full cost for out-of-network services."

- term: "PA"
  full: "Prior Authorization"
  def: "A designated permission a provider requests from the health care plan before performing a service; required by most managed care plans for high-cost or complex procedures."

- term: "PDP"
  full: "Prescription Drug Plan"
  def: "Medicare Part D — an optional add-on (or standalone plan) covering prescription medications and vaccines; often bundled with Part C into a MAPD plan."

- term: "MA"
  full: "Medicare Advantage"
  def: "Medicare Part C — a private plan that bundles Part A, Part B, and optional extras (dental, vision, gym) administered by CMS-contracted private insurers."

- term: "PMPM"
  full: "Per Member Per Month"
  def: "The fixed monthly capitation payment a provider receives for each enrolled member regardless of the number of visits; same concept as PHPM."

- term: "MRN"
  full: "Medical Record Number"
  def: "A unique identifier assigned by a healthcare facility to track a patient's records; classified as PHI under HIPAA."

- term: "SSN"
  full: "Social Security Number"
  def: "A 9-digit US government identifier; listed as PHI under HIPAA because it can be used to identify an individual member."

- term: "DOB"
  full: "Date of Birth"
  def: "A member's birth date; classified as PHI under HIPAA and used to verify eligibility and calculate Medicare qualification age (65+)."

- term: "AR"
  full: "Accounts Receivable"
  def: "The outstanding balance owed to a provider for services rendered but not yet fully reimbursed by payers or patients."

- term: "EM"
  full: "Evaluation and Management"
  def: "A category of CPT codes (99202–99215) describing physician office visits; new patient codes start at 99202, established patient codes start at 99212."

- term: "Adjudication"
  full: "Claim Evaluation Process"
  def: "The automated or manual process a payer uses to evaluate a submitted claim and determine whether to pay, partially pay, or deny it within the TAT window."

- term: "Deductible"
  full: "PR-1 — Patient Responsibility"
  def: "A fixed annual dollar amount the member must pay out-of-pocket before the insurance starts sharing costs; resets every calendar year (Jan 1 → Dec 31)."

- term: "Co-pay"
  full: "PR-3 — Patient Responsibility"
  def: "A fixed dollar amount the member pays at the time of service (e.g. $30 per specialist visit), regardless of total service cost or deductible status."

- term: "Co-insurance"
  full: "PR-2 — Patient Responsibility"
  def: "The percentage of allowed charges the member owes after the deductible is met (e.g. 20% on a $1,000 claim = $200 member owes); exact dollar amount known only after adjudication."

- term: "Modifier"
  full: "CPT Level 1 / HCPCS Level 2 Add-on Code"
  def: "A 2-character alphanumeric code appended to a CPT (Level 1) or HCPCS (Level 2) code to add clinical detail, such as RT (right side), LT (left side), or 50 (bilateral)."

- term: "Dual Member"
  full: "Medicare + Medicaid Dual Eligibility"
  def: "A member simultaneously eligible for both Medicare (primary) and Medicaid (secondary); common among elderly low-income individuals, resulting in near-zero out-of-pocket costs."

- term: "Balance Billing"
  full: "Out-of-Network Billing Risk"
  def: "When an out-of-network provider bills the member the difference between their full charge and what the payer paid; not permitted for in-network (participating) providers."

- term: "Write-off"
  full: "Accounts Receivable Adjustment"
  def: "An AR adjustment made when a denied or underpaid claim cannot be recovered through appeals; the uncollectable amount is removed from the AR balance."
