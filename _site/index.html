<style>
:root {
  --bg: #f7f7f7;
  --ink: #111;
  --muted: #aaa;
  --border: #ddd;
  --pill: 999px;
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  
}

*, *::before, *::after { box-sizing: border-box; }
body {
  margin: 0;
  font-family: var(--font-body);
  color: var(--ink);
  /* The texture is defined ONCE here */
  background: url('assets/img/p2.jpg'), var(--bg); 
  background-repeat: repeat;
}

/* HERO */
.cover {
  width: 100%;
  height: 58vh;
  /* Remove the second texture here; let the body background show through */
  background-image: url('assets/img/cover.png');
  background-position: center top;
  background-repeat: no-repeat;
  background-size: contain; 
  /* Set to transparent so the body texture is visible on the sides */
  background-color: transparent; 
}


/* HERO */

/* MAIN */
.content {
  max-width: 950px;
  margin: 50px auto 90px;
  padding: 0 24px;
  text-align: center;
}

h1 {
  font-family: var(--font-head);
  font-size: 58px;
  font-weight: 700;
  letter-spacing: -1px;
  margin-bottom: 14px;
}

h2 { font-family: var(--font-head); }

.tagline {
  font-size: 28px;
  margin-bottom: 48px;
  opacity: .7;
}

/* NAV */
.nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 28px;
}

.nav a {
  text-decoration: none;
  color: var(--ink);
  border: 2px solid var(--ink);
  padding: 14px 30px;
  border-radius: var(--pill);
  font-family: var(--font-head);
  font-size: 18px;
  font-weight: 600;
  transition: .25s ease;
}

.nav a:hover {
  background: var(--ink);
  color: white;
  transform: translateY(-4px);
  box-shadow: 0 10px 18px rgba(0,0,0,.12);
}

/* ── QUICK LINKS ── */
.quick-links {
  border-top: 1px solid black;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 72px;
}

.quick-links-label {
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  opacity: .95;
  margin-right: 4px;
}

.quick-links a {
  text-decoration: none;
  color: var(--ink);
  font-size: 16px;
  opacity: .95;
  padding: 4px 10px;
  border-radius: var(--pill);
  border: 1.5px solid transparent;
  transition: .15s;
}

.quick-links a:hover {
  opacity: .75;
  border-color: rgba(0,0,0,.15);
}

.quick-links-sep {
  opacity: .15;
  font-size: 11px;
}

/* CONNECT */
.connect {
  border-top: 1px solid var(--border);
  padding-top: 60px;
}

.connect h2 {
  font-size: 34px;
  margin-bottom: 35px;
}

.contact-text {
  display: flex;
  justify-content: center;
  gap: 34px;
  flex-wrap: wrap;
  font-size: 21px;
  margin-bottom: 38px;
}

.contact-text span {
  cursor: pointer;
  transition: .2s;
  border-bottom: 1px dotted var(--muted);
  padding-bottom: 2px;
}

.contact-text span:hover { opacity: .6; }

.social-icons {
  display: flex;
  justify-content: center;
  gap: 42px;
  font-size: 38px;
  margin-bottom: 25px;
}

.social-icons a {
  color: var(--ink);
  text-decoration: none;
  transition: .25s;
  cursor: pointer;
}

.social-icons a:hover {
  transform: translateY(-4px) scale(1.12);
  opacity: .75;
}

#copied { height: 25px; opacity: .6; font-size: 15px; }

.footer { margin-top: 70px; font-size: 15px; opacity: .5; }

/* MOBILE */
@media (max-width: 768px) {
  .cover { height: 42vh; }
  h1 { font-size: 42px; }
  .tagline { font-size: 22px; }
  .nav a { padding: 12px 22px; font-size: 16px; }
  .contact-text { font-size: 18px; }
  .social-icons { font-size: 34px; }
}
</style>
