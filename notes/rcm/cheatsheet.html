<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCM Master Cheat-Sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:      #1A2E44;
  --navy2:     #0F1F30;
  --blue:      #2563EB;
  --blue-lt:   #DBEAFE;
  --blue-mid:  #93C5FD;
  --green:     #166534;
  --green-lt:  #DCFCE7;
  --green-mid: #86EFAC;
  --amber:     #92400E;
  --amber-lt:  #FEF3C7;
  --red:       #991B1B;
  --red-lt:    #FEE2E2;
  --purple:    #5B21B6;
  --purple-lt: #EDE9FE;
  --gray-dk:   #1F2937;
  --gray-md:   #6B7280;
  --gray-lt:   #F3F4F6;
  --gray-bd:   #E5E7EB;
  --white:     #FFFFFF;
  --font:      'Inter', system-ui, sans-serif;
  --mono:      'JetBrains Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);font-size:14px;line-height:1.6;color:var(--gray-dk);background:#F8FAFC;min-height:100vh}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,var(--navy) 0%,#0D1B2A 60%,#1A2E44 100%);color:#fff;padding:28px 40px 24px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:-60px;right:-60px;width:240px;height:240px;background:radial-gradient(circle,rgba(37,99,235,.2) 0%,transparent 70%);border-radius:50%}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.hdr-chip{display:inline-block;background:var(--blue);color:#fff;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:4px;margin-bottom:8px}
.hdr-title{font-size:26px;font-weight:800;color:#fff;line-height:1.15}
.hdr-sub{font-size:12px;color:var(--blue-mid);margin-top:3px}
.hdr-back{color:rgba(255,255,255,.55);font-size:12px;text-decoration:none;display:flex;align-items:center;gap:4px;white-space:nowrap;transition:color .15s}
.hdr-back:hover{color:#fff}
.gp{margin-top:18px}
.gp-lbl{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.55);margin-bottom:5px}
.gp-lbl strong{color:var(--green-mid)}
.gp-track{height:4px;background:rgba(255,255,255,.12);border-radius:4px;overflow:hidden}
.gp-fill{height:100%;background:linear-gradient(90deg,var(--blue),#34D399);border-radius:4px;transition:width .4s ease}

/* ── TOOLBAR ── */
.toolbar{background:#fff;border-bottom:1px solid var(--gray-bd);padding:10px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.srch-wrap{flex:1;min-width:180px;position:relative}
.srch-input{width:100%;border:1px solid var(--gray-bd);border-radius:8px;padding:7px 12px 7px 34px;font-size:13px;font-family:var(--font);color:var(--gray-dk);background:var(--gray-lt);transition:border-color .15s,background .15s;outline:none}
.srch-input:focus{border-color:var(--blue);background:#fff}
.srch-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-md);pointer-events:none}
.tbtn{border:1.5px solid var(--gray-bd);background:#fff;border-radius:8px;padding:6px 13px;font-size:12px;font-family:var(--font);font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;color:var(--gray-dk)}
.tbtn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.tbtn.on{background:var(--navy);border-color:var(--navy);color:#fff}
.tbtn.on:hover{background:var(--blue);border-color:var(--blue)}
.tbtn.danger:hover{border-color:var(--red);color:var(--red);background:var(--red-lt)}
.tdiv{width:1px;height:22px;background:var(--gray-bd);flex-shrink:0}
.kbhint{font-size:11px;color:var(--gray-md);font-family:var(--mono);white-space:nowrap}
@media(max-width:700px){.kbhint{display:none}}

/* ── TAB BAR ── */
.tabs{background:#fff;border-bottom:1px solid var(--gray-bd);padding:0 32px;display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 14px;font-size:11.5px;font-weight:600;color:var(--gray-md);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:5px}
.tab:hover{color:var(--blue)}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.tc{background:var(--blue-lt);color:var(--blue);font-size:10px;font-weight:700;padding:1px 5px;border-radius:99px}
.tab.on .tc{background:var(--blue);color:#fff}
.tm{background:var(--green-lt);color:var(--green);font-size:10px;font-weight:700;padding:1px 5px;border-radius:99px}

/* ── CONTENT ── */
.content{max-width:880px;margin:0 auto;padding:24px 32px 100px}

/* ── SECTION HEADER ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin:32px 0 10px}
.sh:first-child{margin-top:0}
.sh-title{font-size:15px;font-weight:700;color:var(--navy)}
.sh-prog{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--gray-md)}
.sh-mini{width:70px;height:3px;background:var(--gray-bd);border-radius:3px;overflow:hidden}
.sh-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}

/* ── TABLE ── */
.twrap{border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:4px}
.ctable{width:100%;border-collapse:collapse;font-size:13.5px}
.ctable thead th{background:var(--navy);color:#fff;font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:8px 12px;text-align:left}
.ctable thead th:first-child{width:34px}
.crow{cursor:pointer;transition:background .1s}
.crow:nth-child(even) td{background:#fff}
.crow:nth-child(odd) td{background:#FAFBFC}
.crow:hover td{background:var(--blue-lt)!important}
.crow.focused td{background:#EFF6FF!important}
.crow.focused td:first-child{box-shadow:inset 3px 0 0 var(--blue)}
.crow.mastered td{background:#F0FDF4!important}
.crow.mastered:hover td{background:var(--green-lt)!important}
.crow td{padding:9px 12px;border-bottom:1px solid var(--gray-bd);vertical-align:top}
.crow:last-child td{border-bottom:none}
.mc{width:34px;vertical-align:middle!important;padding:0 8px!important}
.mbox{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--gray-bd);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .12s;flex-shrink:0}
.mbox.on{background:var(--green);border-color:var(--green);color:#fff}
.cue{font-weight:600;color:var(--navy);line-height:1.4}
.ans{color:var(--gray-dk);transition:filter .2s;line-height:1.5}
.blur-mode .ans{filter:blur(5px);cursor:pointer;user-select:none}
.blur-mode .ans.rev{filter:none;cursor:default}
.blur-mode .crow.mastered .ans{filter:none}
.nores{text-align:center;padding:48px 24px;color:var(--gray-md)}
.nores h3{font-size:17px;color:var(--gray-md);margin-bottom:6px}
mark{background:#FEF9C3;color:#713F12;padding:0 2px;border-radius:2px}

/* ── QUIZ MODE ── */
.qwrap{display:none;max-width:560px;margin:32px auto 0;padding:0 32px 80px}
.qwrap.on{display:block}
.qcard{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.10);padding:40px 36px 28px;text-align:center;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.qbadge{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:var(--blue-lt);color:var(--blue);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 10px;border-radius:99px;white-space:nowrap}
.qcue{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:18px;line-height:1.3}
.qans{font-size:14px;color:var(--gray-dk);line-height:1.65;transition:filter .2s;max-width:440px}
.qans.hidden{filter:blur(6px);cursor:pointer}
.qnav{display:flex;align-items:center;justify-content:space-between;margin-top:20px;gap:10px}
.qnavbtn{border:1.5px solid var(--gray-bd);background:#fff;border-radius:8px;padding:7px 18px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font)}
.qnavbtn:hover:not(:disabled){border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.qnavbtn:disabled{opacity:.35;cursor:default}
.qctr{font-size:12px;color:var(--gray-md);font-family:var(--mono);text-align:center}
.qmbtn{background:var(--green-lt);border:1.5px solid var(--green);color:var(--green);border-radius:8px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;font-family:var(--font);margin-top:6px}
.qmbtn:hover{background:var(--green);color:#fff}
.qmbtn.on{background:var(--green);color:#fff}
.qrevhint{font-size:11px;color:var(--gray-md);margin-top:4px}

/* ── KEYBOARD PANEL ── */
.kbpanel{position:fixed;bottom:20px;right:20px;background:var(--navy);color:rgba(255,255,255,.65);border-radius:10px;padding:10px 14px;font-size:10.5px;font-family:var(--mono);line-height:1.9;z-index:200;pointer-events:none;opacity:.9}
.kbpanel span{color:#fff}
@media(max-width:680px){.kbpanel{display:none}}

/* ── PRINT ── */
@media print{
  .hdr,.toolbar,.tabs,.kbpanel,.qwrap{display:none!important}
  .content{padding:0!important;max-width:none!important}
  .twrap{box-shadow:none!important;border:1px solid #ccc}
  .ans{filter:none!important}
  body{font-size:12px!important;background:#fff!important}
  .crow td{padding:5px 10px!important}
  .sh{break-after:avoid}
}
@keyframes rcm-pulse{0%{box-shadow:0 0 0 3px rgba(37,99,235,.65)}60%{box-shadow:0 0 0 9px rgba(37,99,235,0)}100%{box-shadow:0 0 0 0 rgba(37,99,235,0)}}
.rcm-nav{animation:rcm-pulse .75s ease-out}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-chip">RCM Study Tools · 2026</div>
      <div class="hdr-title">Master Cheat-Sheet</div>
      <div class="hdr-sub" id="hdr-sub">12 sections · 73 rows</div>
    </div>
    <a href="/Saptak/notes/1234" class="hdr-back">← Study Hub</a>
  </div>
  <div class="gp">
    <div class="gp-lbl"><span>Mastery progress</span><strong id="gp-txt">0 / 73 mastered</strong></div>
    <div class="gp-track"><div class="gp-fill" id="gp-bar" style="width:0%"></div></div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="srch-wrap">
    <svg class="srch-ico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" class="srch-input" id="srch" placeholder="Search cues and answers…" autocomplete="off">
  </div>
  <div class="tdiv"></div>
  <button class="tbtn on" id="blur-btn" onclick="toggleBlur()">🙈 Blur answers</button>
  <button class="tbtn" id="quiz-btn" onclick="toggleQuiz()">🃏 Card mode</button>
  <div class="tdiv"></div>
  <button class="tbtn" onclick="revealAll()" title="Reveal all answers in current view">👁 Reveal all</button>
  <button class="tbtn danger" onclick="resetProgress()" title="Clear mastered marks">↺ Reset</button>
  <button class="tbtn" onclick="window.print()">🖨 Print</button>
  <span class="kbhint">J/K·Space·M·F·Q</span>
</div>

<!-- TABS -->
<div class="tabs" id="tabs"></div>

<!-- TABLE VIEW -->
<div class="content" id="table-view"></div>

<!-- QUIZ VIEW -->
<div class="qwrap" id="quiz-view">
  <div class="qcard">
    <div class="qbadge" id="qbadge"></div>
    <div class="qcue" id="qcue"></div>
    <div class="qans hidden" id="qans" onclick="revealCard()"><span id="qans-txt"></span></div>
    <div class="qrevhint" id="qrevhint">Click or press Space to reveal</div>
  </div>
  <div class="qnav">
    <button class="qnavbtn" onclick="qPrev()" id="qprev">← Prev</button>
    <div style="display:flex;flex-direction:column;align-items:center">
      <span class="qctr" id="qctr">1 / 73</span>
      <button class="qmbtn" id="qmbtn" onclick="toggleQMastered()">☆ Mark mastered</button>
    </div>
    <button class="qnavbtn" onclick="qNext()" id="qnext">Next →</button>
  </div>
</div>

<!-- KEYBOARD PANEL -->
<div class="kbpanel">
  <span>J / K</span> — next / prev row<br>
  <span>Space</span> — reveal answer<br>
  <span>M</span> — mark mastered<br>
  <span>F</span> — focus search<br>
  <span>Q</span> — card mode<br>
  <span>R</span> — reveal all
</div>

<script>
/* ── DATA ─────────────────────────────────────────────────────────── */
const S = [
  { id:'s0', title:'The 5 Participants', rows:[
    {cue:'Member',              ans:'The US policyholder — the patient who receives care and holds the insurance'},
    {cue:'Provider',            ans:'Individual or organization delivering care (doctors, hospitals)'},
    {cue:'Payer',               ans:'The insurance company — the entity that pays the claim'},
    {cue:'Supplier',            ans:'Supplies medical equipment or supplies used to treat or prevent illness'},
    {cue:'Researcher',          ans:'Conducts experiments and studies for human health and wellbeing'},
  ]},
  { id:'s1', title:'HIPAA at a Glance', rows:[
    {cue:'HIPAA enacted',               ans:'1996 — by DHHS (Department of Health and Human Services)'},
    {cue:'What HIPAA protects',         ans:'PHI — Protected Health Information: name, DOB, SSN, MRN, address, phone, admission/discharge dates, photos'},
    {cue:'4 entities bound by HIPAA',   ans:'1. Health Care Providers  2. Health Care Plans  3. HCCH (Clearing House)  4. Business Associates'},
    {cue:'HCCH role',                   ans:'Standardizes non-standardized billing data from providers and forwards it to payers'},
  ]},
  { id:'s2', title:'Medicare vs Medicaid', rows:[
    {cue:'Medicare — run by',         ans:'Federal government'},
    {cue:'Medicare — covers',         ans:'80% of covered charges (patient pays the remaining ~20%)'},
    {cue:'Medicare — age criterion',  ans:'65+  OR  disabled receiving 24+ months SSI  OR  paid 40 quarters (10 yrs) of US federal tax'},
    {cue:'Medicare — also covers',    ans:'ESRD (End Stage Renal Disease) — regardless of age'},
    {cue:'Medicaid — run by',         ans:'Joint: state-supervised + federally monitored; funded by both'},
    {cue:'Medicaid — covers',         ans:'100% of covered charges'},
    {cue:'Medicaid — who qualifies',  ans:'Below federal poverty line; disabled; pregnant women; children; no age limit'},
    {cue:'Medicaid — payer order',    ans:'Payer of LAST resort — pays only after all other coverages are exhausted'},
    {cue:'Memory hook',               ans:'Medicare = "Rich" / 65+ / federal.  Medicaid = "Poor" / state + federal.'},
  ]},
  { id:'s3', title:'Medicare Parts A–D', rows:[
    {cue:'Part A — Original',  ans:'Hospital / Inpatient — stays ≥ 24 hours. Premium-free at 65+.'},
    {cue:'Part B — Original',  ans:'Outpatient / Medical — visits < 24 hrs + DME. Optional add-on, has premium.'},
    {cue:'Part C — Advantage', ans:'Medicare Advantage — bundles A + B + extras (dental, vision, hearing, transport, gym)'},
    {cue:'Part D — PDP',       ans:'Prescription Drug Plan — optional add-on; covers medicines and vaccines'},
    {cue:'MAPD',               ans:'Medicare Advantage Prescription Drug plan = Part C + Part D bundled together'},
    {cue:'DME (Part B)',       ans:'Durable Medical Equipment — rented/purchased for repeated home use (walkers, wheelchairs, hospital beds)'},
  ]},
  { id:'s4', title:'Government Programs', rows:[
    {cue:'TRICARE / CHAMPUS', ans:'Military personnel (active, deceased, disabled, retirees) AND their dependents'},
    {cue:'CHAMPVA',           ans:'War veterans (active, deceased, disabled, or partially disabled) AND their dependents — run by VA'},
    {cue:'No-Fault Liability', ans:'Covers injury or property damage from accidents regardless of who caused it (optional add-on)'},
    {cue:'Workers\' Comp',    ans:'Covers injuries sustained on work premises or during active work hours'},
  ]},
  { id:'s5', title:'Managed Care Plan Types', rows:[
    {cue:'HMO',                  ans:'Health Maintenance Organization — in-network only + PCP referral required. Lowest cost.'},
    {cue:'PPO',                  ans:'Preferred Provider Organization — flexible, OON allowed, no referral needed. Higher cost.'},
    {cue:'EPO',                  ans:'Exclusive Provider Organization — in-network only (like HMO) but NO referral required'},
    {cue:'POS',                  ans:'Point of Service — hybrid HMO/PPO; needs PCP referral, but OON allowed at higher cost'},
    {cue:'HMO — referral needed?', ans:'YES — PCP must refer the member to any specialist'},
    {cue:'PPO — OON allowed?',    ans:'YES — at a higher cost share than in-network'},
    {cue:'2 rules of Managed Care', ans:'1. Authorization/Referral ALWAYS required  2. Member ALWAYS visits in-network providers'},
  ]},
  { id:'s6', title:'Provider Types', rows:[
    {cue:'Individual Providers', ans:'PCP (Primary Care Physician) + Specialists'},
    {cue:'Facility Providers',   ans:'Hospital · SNF · ASC · Home Health · Hospice'},
    {cue:'PCP role',             ans:'First point of contact and gatekeeper; issues referrals to specialists'},
    {cue:'SNF',                  ans:'Skilled Nursing Facility — post-surgical recovery + ADL (Activities of Daily Living) care'},
    {cue:'ASC',                  ans:'Ambulatory Surgical Center — same-day surgery (in and out the same day, e.g. cataract surgery)'},
    {cue:'Hospice',              ans:'End-of-life care at home or home-like setting for terminally ill patients'},
    {cue:'INN provider',         ans:'Participating provider — has a contract with the payer → lower cost-sharing for the member'},
    {cue:'OON provider',         ans:'Non-participating provider — no contract with payer → higher cost or no coverage'},
  ]},
  { id:'s7', title:'Authorization & Referral', rows:[
    {cue:'Authorization',        ans:'Designated permission a provider requests from the health plan to perform a service on a member'},
    {cue:'Referral',             ans:'The first-time authorization (from PCP to insurance, for a specialist visit)'},
    {cue:'4 ways to initiate',   ans:'1. Phone call  2. Online portal  3. PA Form (Prior Authorization)  4. E-Fax'},
    {cue:'PCP → Insurance call', ans:'Referral call'},
    {cue:'Specialist → Insurance call', ans:'Authorization call'},
  ]},
  { id:'s8', title:'Payment Models', rows:[
    {cue:'Capitation', ans:'Fixed per-member-per-month (PHPM) payment — provider gets same $ regardless of visit count. Rewards keeping patients healthy.'},
    {cue:'Fee for Service (FFS)', ans:'Paid per service rendered (unbundled). More procedures = more revenue. Rewards volume.'},
  ]},
  { id:'s9', title:'The 5 Code Sets', rows:[
    {cue:'CPT',                         ans:'Current Procedural Terminology — procedures/services/treatments. 5-digit numeric (e.g. 10040, 66984)'},
    {cue:'ICD / ICD-10',                ans:'International Classification of Disease — condition/disease/symptoms. Alphanumeric (e.g. R51 headache, E11.22 diabetes)'},
    {cue:'HCPCS',                       ans:'Healthcare Common Procedure Coding System — misc products + DME. 5 alphanumeric (e.g. E0265 hospital bed)'},
    {cue:'Modifiers',                   ans:'Add extra clarity to a CPT (level 1) or HCPCS (level 2) code. 2 alphanumeric (e.g. RT=right, LT=left, 50=bilateral)'},
    {cue:'POS (Place of Service)',       ans:'Where the service was rendered. 2-digit numeric (11=Office, 21=Hospital, 24=ASC, 12=Home)'},
    {cue:'CPT vs ICD — one-liner',       ans:'CPT = what you DID (procedure).  ICD = what they HAVE (diagnosis).'},
    {cue:'New patient E/M codes',        ans:'99202 – 99205'},
    {cue:'Established patient E/M codes',ans:'99212 – 99215'},
  ]},
  { id:'s10', title:'Billing & Claims', rows:[
    {cue:'TFL',                   ans:'Timely Filing Limit — deadline to submit a claim, set by the payer. Miss it = automatic denial.'},
    {cue:'TAT',                   ans:'Turn Around Time — time payer\'s adjudication team takes to decide on a claim (also applies to authorizations)'},
    {cue:'NPI',                   ans:'National Provider Identifier — 10-digit unique number per individual provider'},
    {cue:'TIN',                   ans:'Tax Identification Number — 9-digit, shared by multiple providers in a group'},
    {cue:'COB',                   ans:'Coordination of Benefits — determines which payer is primary / secondary / tertiary when member has multiple coverages'},
    {cue:'EOB',                   ans:'Explanation of Benefits — detailed claim-processing summary sent to both provider and member'},
    {cue:'Dual member',           ans:'Member simultaneously eligible for both Medicare AND Medicaid'},
    {cue:'3 classic denial reasons', ans:'1. Filed after TFL  2. No active insurance on the Date of Service  3. No authorization obtained'},
    {cue:'Appeal',                ans:'Challenge filed by a provider when a claim is wrongly denied by the payer'},
  ]},
  { id:'s11', title:'Patient Responsibility (~20%)', rows:[
    {cue:'PR-1 — Deductible',  ans:'Fixed dollar amount the member must pay first each calendar year before insurance kicks in'},
    {cue:'PR-2 — Co-Insurance',ans:'Percentage cost-share between member and insurer; exact dollar amount known only AFTER the claim is processed'},
    {cue:'PR-3 — Co-Pay',      ans:'Fixed dollar amount paid by the member up-front at the time of service'},
    {cue:'OOP (Out of Pocket)', ans:'Annual spending ceiling = Deductible + Co-Insurance + Co-Pay + non-covered charges. Once hit, insurer pays 100%.'},
    {cue:'Who pays ~80%?',     ans:'The payer (insurance company)'},
    {cue:'Who pays ~20%?',     ans:'The member (patient responsibility)'},
  ]},
];

/* flatten with stable IDs */
const ROWS = [];
S.forEach((sec,si) => sec.rows.forEach((r,ri) => ROWS.push({...r, id:`${sec.id}-${ri}`, si, section:sec.title})));
const TOTAL = ROWS.length;

/* ── STATE ──────────────────────────────────────────────────────────── */
const LS_M = 'rcm-cs2-mastered';
const st = {
  sec:  'all',
  blur: true,
  quiz: false,
  q:    '',
  fi:   -1,   /* focused row index */
  qi:   0,    /* quiz card index */
  qrev: false,
  mastered: new Set(JSON.parse(localStorage.getItem(LS_M)||'[]')),
};
const save = () => localStorage.setItem(LS_M, JSON.stringify([...st.mastered]));

/* ── DERIVED ─────────────────────────────────────────────────────────── */
function visible() {
  let rows = ROWS;
  if (st.sec !== 'all') rows = rows.filter(r => r.si === S.findIndex(s => s.id === st.sec));
  if (st.q.trim()) {
    const q = st.q.trim().toLowerCase();
    rows = rows.filter(r => r.cue.toLowerCase().includes(q) || r.ans.toLowerCase().includes(q));
  }
  return rows;
}

/* ── RENDER ──────────────────────────────────────────────────────────── */
function renderAll() { renderTabs(); renderTable(); renderGP(); if (st.quiz) renderCard(); }

function renderTabs() {
  let h = `<div class="tab ${st.sec==='all'?'on':''}" onclick="setSec('all')">All <span class="tc">${TOTAL}</span></div>`;
  S.forEach(sec => {
    const m = sec.rows.filter((_,ri) => st.mastered.has(`${sec.id}-${ri}`)).length;
    const short = sec.title
      .replace('Medicare vs Medicaid','Medicare/Medicaid')
      .replace('Authorization & Referral','Auth/Referral')
      .replace('Government Programs','Gov Programs')
      .replace('Patient Responsibility (~20%)','Patient Resp.')
      .replace('Managed Care Plan Types','Managed Care')
      .replace('Medicare Parts A–D','Medicare Parts')
      .replace('The 5 Code Sets','Code Sets')
      .replace('Billing & Claims','Billing/Claims');
    h += `<div class="tab ${st.sec===sec.id?'on':''}" onclick="setSec('${sec.id}')">
      ${esc(short)} <span class="tc">${sec.rows.length}</span>
      ${m?`<span class="tm">✓${m}</span>`:''}
    </div>`;
  });
  document.getElementById('tabs').innerHTML = h;
}

function renderGP() {
  const m = st.mastered.size;
  const pct = TOTAL ? (m/TOTAL*100).toFixed(1) : 0;
  document.getElementById('gp-txt').textContent = `${m} / ${TOTAL} mastered`;
  document.getElementById('gp-bar').style.width = pct + '%';
}

function renderTable() {
  const v = visible();
  const el = document.getElementById('table-view');
  if (!v.length) { el.innerHTML = `<div class="nores"><h3>No results</h3><p>Try a different search or select a different section.</p></div>`; return; }

  const bc = st.blur ? 'blur-mode' : '';
  const bySection = st.sec === 'all' && !st.q.trim();
  let h = '';

  if (bySection) {
    S.forEach((sec,si) => {
      const sr = v.filter(r => r.si === si);
      if (!sr.length) return;
      const m = sr.filter(r => st.mastered.has(r.id)).length;
      const pct = sr.length ? m/sr.length*100 : 0;
      h += `<div class="sh"><div class="sh-title">${esc(sec.title)}</div>
        <div class="sh-prog">${m}/${sr.length}<div class="sh-mini"><div class="sh-fill" style="width:${pct}%"></div></div></div></div>
        ${table(sr, bc)}`;
    });
  } else {
    if (st.sec !== 'all') {
      const sec = S.find(s => s.id === st.sec);
      const m = v.filter(r => st.mastered.has(r.id)).length;
      const pct = v.length ? m/v.length*100 : 0;
      h += `<div class="sh" style="margin-top:0"><div class="sh-title">${esc(sec.title)}</div>
        <div class="sh-prog">${m}/${v.length}<div class="sh-mini"><div class="sh-fill" style="width:${pct}%"></div></div></div></div>`;
    }
    h += table(v, bc);
  }
  el.innerHTML = h;

  /* apply focus */
  const rows = el.querySelectorAll('.crow');
  if (st.fi >= 0 && rows[st.fi]) { rows[st.fi].classList.add('focused'); rows[st.fi].scrollIntoView({block:'nearest'}); }
  /* restore mastered */
  rows.forEach(tr => { if (st.mastered.has(tr.dataset.id)) tr.classList.add('mastered'); });
}

function table(rows, bc) {
  const q = st.q.trim().toLowerCase();
  let h = `<div class="twrap ${bc}"><table class="ctable">
    <thead><tr><th></th><th>Cue</th><th>Answer</th></tr></thead><tbody>`;
  rows.forEach(r => {
    const m = st.mastered.has(r.id);
    const ch = q ? hi(r.cue,q) : esc(r.cue);
    const ah = q ? hi(r.ans,q) : esc(r.ans);
    h += `<tr class="crow ${m?'mastered':''}" data-id="${r.id}" onclick="rowClick(event,'${r.id}')">
      <td class="mc"><div class="mbox ${m?'on':''}" onclick="event.stopPropagation();toggleM('${r.id}')" title="Mark mastered">${m?'✓':''}</div></td>
      <td><span class="cue">${ch}</span></td>
      <td><span class="ans">${ah}</span></td>
    </tr>`;
  });
  h += `</tbody></table></div>`;
  return h;
}

function hi(text, q) {
  const e = esc(text);
  if (!q) return e;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return e.replace(re, '<mark>$1</mark>');
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── QUIZ CARD ───────────────────────────────────────────────────────── */
function renderCard() {
  const v = visible();
  if (!v.length) return;
  if (st.qi >= v.length) st.qi = 0;
  const r = v[st.qi];
  document.getElementById('qbadge').textContent = r.section;
  document.getElementById('qcue').textContent = r.cue;
  document.getElementById('qans-txt').textContent = r.ans;
  document.getElementById('qctr').textContent = `${st.qi+1} / ${v.length}`;
  const qa = document.getElementById('qans');
  qa.classList.add('hidden');
  st.qrev = false;
  document.getElementById('qrevhint').style.display = '';
  const m = st.mastered.has(r.id);
  const mb = document.getElementById('qmbtn');
  mb.textContent = m ? '✓ Mastered' : '☆ Mark mastered';
  mb.classList.toggle('on', m);
  document.getElementById('qprev').disabled = st.qi === 0;
  document.getElementById('qnext').disabled = st.qi === v.length - 1;
}
function revealCard() {
  document.getElementById('qans').classList.remove('hidden');
  document.getElementById('qrevhint').style.display = 'none';
  st.qrev = true;
}
function qNext() { const v=visible(); if(st.qi<v.length-1){st.qi++;renderCard();} }
function qPrev() { if(st.qi>0){st.qi--;renderCard();} }
function toggleQMastered() {
  const v=visible(); if(!v[st.qi]) return;
  const id=v[st.qi].id;
  st.mastered.has(id) ? st.mastered.delete(id) : st.mastered.add(id);
  save(); renderCard(); renderTabs(); renderGP();
}

/* ── ACTIONS ─────────────────────────────────────────────────────────── */
function setSec(id) { st.sec=id; st.fi=-1; renderAll(); }
function toggleBlur() {
  st.blur = !st.blur;
  document.getElementById('blur-btn').textContent = st.blur ? '🙈 Blur answers' : '👁 Show answers';
  document.getElementById('blur-btn').classList.toggle('on', st.blur);
  renderTable();
}
function revealAll() {
  document.querySelectorAll('.ans').forEach(a => a.classList.add('rev'));
}
function toggleQuiz() {
  st.quiz = !st.quiz; st.qi = 0;
  document.getElementById('table-view').style.display = st.quiz ? 'none' : '';
  document.getElementById('quiz-view').classList.toggle('on', st.quiz);
  document.getElementById('quiz-btn').classList.toggle('on', st.quiz);
  if (st.quiz) renderCard();
}
function toggleM(id) {
  st.mastered.has(id) ? st.mastered.delete(id) : st.mastered.add(id);
  save(); renderAll();
}
function rowClick(e, id) {
  if (st.blur) {
    const ans = e.currentTarget.querySelector('.ans');
    if (ans && !st.mastered.has(id)) ans.classList.add('rev');
  }
  const rows = [...document.querySelectorAll('.crow')];
  const i = rows.findIndex(r => r.dataset.id === id);
  st.fi = i;
  rows.forEach((r,j) => r.classList.toggle('focused', j===i));
  const tr = rows[i];
  if (tr) {
    tr.scrollIntoView({behavior:'smooth', block:'nearest'});
    history.replaceState(null, '', '#row-' + id);
    tr.classList.add('rcm-nav');
    setTimeout(() => tr.classList.remove('rcm-nav'), 750);
  }
}
function resetProgress() {
  if (!confirm('Clear all mastered marks?')) return;
  st.mastered.clear(); save(); renderAll();
}

/* ── SEARCH ──────────────────────────────────────────────────────────── */
document.getElementById('srch').addEventListener('input', function() {
  st.q = this.value; st.fi = -1;
  if (st.quiz) { st.qi=0; renderCard(); } else { renderTable(); renderTabs(); }
});

/* ── KEYBOARD ────────────────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  const tag = document.activeElement?.tagName;
  const inp = tag==='INPUT'||tag==='TEXTAREA';

  if ((e.key==='f'||e.key==='F') && !inp) { e.preventDefault(); document.getElementById('srch').focus(); return; }
  if ((e.key==='q'||e.key==='Q') && !inp) { toggleQuiz(); return; }
  if ((e.key==='r'||e.key==='R') && !inp) { revealAll(); return; }

  if (st.quiz) {
    if (e.key==='ArrowRight'||e.key==='l'||e.key==='L') qNext();
    if (e.key==='ArrowLeft' ||e.key==='h'||e.key==='H') qPrev();
    if (e.key===' '){ e.preventDefault(); revealCard(); }
    if (e.key==='m'||e.key==='M') toggleQMastered();
    return;
  }
  if (inp) return;

  const rows = [...document.querySelectorAll('.crow')];
  if (!rows.length) return;

  if (e.key==='j'||e.key==='J'||e.key==='ArrowDown') {
    e.preventDefault();
    st.fi = Math.min(st.fi+1, rows.length-1);
    if (st.fi<0) st.fi=0;
    rows.forEach((r,i)=>r.classList.toggle('focused',i===st.fi));
    rows[st.fi]?.scrollIntoView({block:'nearest'});
  }
  if (e.key==='k'||e.key==='K'||e.key==='ArrowUp') {
    e.preventDefault();
    st.fi = Math.max(st.fi-1, 0);
    rows.forEach((r,i)=>r.classList.toggle('focused',i===st.fi));
    rows[st.fi]?.scrollIntoView({block:'nearest'});
  }
  if (e.key===' ') {
    e.preventDefault();
    if (st.fi>=0 && rows[st.fi]) rows[st.fi].querySelector('.ans')?.classList.add('rev');
  }
  if (e.key==='m'||e.key==='M') {
    if (st.fi>=0 && rows[st.fi]) toggleM(rows[st.fi].dataset.id);
  }
});

/* ── INIT ─────────────────────────────────────────────────────────────── */
renderAll();

/* ── HASH NAV ── */
(function() {
  var hash = location.hash;
  if (hash && hash.startsWith('#row-')) {
    var id = hash.slice(5);
    var tr = document.querySelector('[data-id="' + id + '"]');
    if (tr) {
      var rows = [...document.querySelectorAll('.crow')];
      st.fi = rows.indexOf(tr);
      rows.forEach(function(r, j) { r.classList.toggle('focused', j === st.fi); });
      tr.scrollIntoView({block: 'nearest'});
      tr.classList.add('rcm-nav');
      setTimeout(function() { tr.classList.remove('rcm-nav'); }, 750);
    }
  }
})();
</script>
</body>
