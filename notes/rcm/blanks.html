<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCM Fill-in-the-Blanks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1A2E44;--navy2:#0F1F30;--blue:#2563EB;--blue-lt:#DBEAFE;--blue-mid:#93C5FD;
  --green:#166534;--green-lt:#DCFCE7;--green-mid:#86EFAC;
  --amber:#92400E;--amber-lt:#FEF3C7;
  --red:#991B1B;--red-lt:#FEE2E2;
  --gray-dk:#1F2937;--gray-md:#6B7280;--gray-lt:#F3F4F6;--gray-bd:#E5E7EB;
  --white:#fff;--bg:#F8FAFC;
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
body.dark{
  --navy2:#0a1520;--gray-dk:#E5E7EB;--gray-md:#9CA3AF;--gray-lt:#1F2937;
  --gray-bd:#374151;--white:#111827;--bg:#111827;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);font-size:14px;line-height:1.6;color:var(--gray-dk);background:var(--bg);min-height:100vh;transition:background .2s,color .2s}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 60%,#1A2E44 100%);padding:32px 32px 36px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-80px;right:-80px;width:260px;height:260px;background:radial-gradient(circle,rgba(37,99,235,.18) 0%,transparent 70%);border-radius:50%}
.hero-chip{display:inline-block;background:var(--blue);color:#fff;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:4px;margin-bottom:10px}
.hero h1{font-size:24px;font-weight:800;color:#fff;margin-bottom:4px}
.hero-sub{font-size:12px;color:var(--blue-mid);margin-bottom:18px}
.hero-back{position:absolute;top:16px;left:20px;color:rgba(255,255,255,.5);font-size:12px;text-decoration:none;transition:color .15s}
.hero-back:hover{color:#fff}
.hero-actions{position:absolute;top:14px;right:20px;display:flex;gap:8px;align-items:center}
.theme-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:var(--font);transition:all .15s}
.theme-btn:hover{background:rgba(255,255,255,.2)}

/* ── FILTER CHIPS ── */
.filter-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.fchip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);font-size:11px;padding:3px 10px;border-radius:99px;cursor:pointer;transition:all .15s;font-family:var(--font)}
.fchip:hover,.fchip.on{background:rgba(37,99,235,.45);border-color:rgba(37,99,235,.6);color:#fff}

/* ── SCORE BAR ── */
.score-bar{display:flex;justify-content:center;gap:16px;margin-top:14px;font-size:12px;font-family:var(--mono)}
.sc-item{color:rgba(255,255,255,.65)}
.sc-item strong{color:#fff}
.sc-green strong{color:var(--green-mid)}
.sc-red strong{color:#FCA5A5}

/* ── MAIN ── */
.main{max-width:640px;margin:0 auto;padding:32px 20px 80px}

/* ── CARD ── */
.card{background:var(--white);border:1.5px solid var(--gray-bd);border-radius:12px;padding:28px 28px 24px;margin-bottom:20px;transition:border-color .15s}
.card.state-correct{border-color:var(--green);background:var(--green-lt)}
.card.state-correct.dark-card{background:rgba(22,101,52,.15)}
.card.state-wrong{border-color:var(--red);background:var(--red-lt)}
.card.state-wrong.dark-card{background:rgba(153,27,27,.15)}
body.dark .card{background:#1F2937;border-color:var(--gray-bd)}
body.dark .card.state-correct{background:rgba(22,101,52,.2);border-color:var(--green)}
body.dark .card.state-wrong{background:rgba(153,27,27,.2);border-color:var(--red)}

.cat-badge{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--blue);font-family:var(--mono);margin-bottom:14px}
.card-counter{float:right;font-size:11px;color:var(--gray-md);font-family:var(--mono)}

.sentence{font-size:18px;font-weight:500;color:var(--gray-dk);line-height:1.7;margin-bottom:22px;word-break:break-word}
body.dark .sentence{color:#E5E7EB}

.blank-wrap{display:inline-flex;align-items:center;vertical-align:middle;margin:0 3px}
.blank-input{
  border:none;border-bottom:2px solid var(--blue);background:transparent;
  font-size:17px;font-family:var(--mono);font-weight:600;color:var(--blue);
  min-width:80px;max-width:220px;width:10ch;padding:2px 4px;
  outline:none;text-align:center;transition:border-color .15s,width .1s;
}
.blank-input:focus{border-bottom-color:var(--navy)}
.state-correct .blank-input{border-bottom-color:var(--green);color:var(--green)}
.state-wrong .blank-input{border-bottom-color:var(--red);color:var(--red)}

.feedback{margin-top:8px;font-size:13px;font-weight:600;min-height:20px}
.feedback.ok{color:var(--green)}
.feedback.err{color:var(--red)}
.reveal-ans{font-size:13px;color:var(--gray-md);margin-top:4px;font-family:var(--mono)}
.reveal-ans strong{color:var(--gray-dk)}
body.dark .reveal-ans strong{color:#E5E7EB}

.btn-row{display:flex;gap:10px;margin-top:20px;align-items:center;flex-wrap:wrap}
.btn-check{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s}
.btn-check:hover{background:var(--navy)}
.btn-check:disabled{opacity:.45;cursor:not-allowed}
.btn-skip{background:transparent;color:var(--gray-md);border:1.5px solid var(--gray-bd);border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s}
.btn-skip:hover{border-color:var(--gray-md);color:var(--gray-dk)}
body.dark .btn-skip{color:var(--gray-md)}
.btn-shuffle{margin-left:auto;background:transparent;color:var(--gray-md);border:1.5px solid var(--gray-bd);border-radius:8px;padding:9px 14px;font-size:12px;cursor:pointer;font-family:var(--font);transition:all .15s}
.btn-shuffle:hover{border-color:var(--gray-md);color:var(--gray-dk)}

/* ── PROGRESS BAR ── */
.prog-wrap{background:var(--gray-bd);border-radius:99px;height:4px;margin-bottom:20px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:99px;transition:width .3s}

/* ── DONE STATE ── */
.done-card{background:var(--white);border:2px solid var(--green);border-radius:12px;padding:40px 28px;text-align:center;margin-bottom:20px}
body.dark .done-card{background:#1F2937;border-color:var(--green)}
.done-emoji{font-size:48px;margin-bottom:16px}
.done-title{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:8px}
body.dark .done-title{color:#E5E7EB}
.done-sub{font-size:14px;color:var(--gray-md);margin-bottom:24px}
.btn-restart{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s}
.btn-restart:hover{background:var(--navy)}

/* ── KEYBOARD HINT ── */
.kbbar{position:fixed;bottom:20px;right:20px;background:var(--navy);color:rgba(255,255,255,.65);border-radius:10px;padding:9px 13px;font-size:10px;font-family:var(--mono);line-height:1.9;z-index:200;pointer-events:none;opacity:.88}
.kbbar span{color:#fff}
@media(max-width:640px){.kbbar{display:none}.sentence{font-size:16px}.btn-shuffle{margin-left:0}}
</style>
</head>
<body>

<div class="hero">
  <a href="/Saptak/notes/1234" class="hero-back">&#8592; Study Hub</a>
  <div class="hero-actions">
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">&#9790; Dark</button>
  </div>
  <div class="hero-chip">RCM &middot; Fill-in-the-Blanks</div>
  <h1>Fill in the Blanks</h1>
  <p class="hero-sub" id="hero-sub">Loading&hellip;</p>
  <div class="filter-row" id="filter-row"></div>
  <div class="score-bar" id="score-bar"></div>
</div>

<div class="main" id="main"></div>

<div class="kbbar">
  <span>Enter</span> check / next<br>
  <span>Tab</span> skip card<br>
  <span>R</span> restart
</div>

<script>
var BLANKS = {{ site.data.rcm_blanks | jsonify }};

/* ── THEME ── */
var THEME_KEY = 'rcm-blanks-theme';
(function() {
  if (localStorage.getItem(THEME_KEY) === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('theme-btn').textContent = '☀ Light';
  }
})();
function toggleTheme() {
  var dark = document.body.classList.toggle('dark');
  localStorage.setItem(THEME_KEY, dark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = dark ? '☀ Light' : '☺ Dark';
}

/* ── STATE ── */
var CATS = ['All', 'Participants', 'HIPAA', 'Payers', 'ManagedCare', 'Providers', 'Coding', 'Claims', 'PatientResp'];
var CAT_LABELS = {All:'All', Participants:'Participants', HIPAA:'HIPAA', Payers:'Payers',
  ManagedCare:'Managed Care', Providers:'Providers', Coding:'Coding', Claims:'Claims', PatientResp:'Patient Resp'};

var st = {
  cat: 'All',
  deck: [],
  idx: 0,
  phase: 'idle', /* idle | correct | wrong */
  score: {correct: 0, wrong: 0}
};

/* ── DECK ── */
function buildDeck() {
  var pool = st.cat === 'All' ? BLANKS : BLANKS.filter(function(b) { return b.cat === st.cat; });
  /* Fisher-Yates shuffle */
  var arr = pool.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  st.deck = arr;
  st.idx = 0;
  st.phase = 'idle';
  st.score = {correct: 0, wrong: 0};
}

/* ── NORMALIZE ANSWER ── */
function normalize(s) {
  return String(s || '').trim().toLowerCase().replace(/[.,!?;:'"-]/g, '').replace(/\s+/g, ' ');
}

function checkAnswer(val, card) {
  var v = normalize(val);
  if (!v) return false;
  if (normalize(card.answer) === v) return true;
  if (card.accept) {
    for (var i = 0; i < card.accept.length; i++) {
      if (normalize(card.accept[i]) === v) return true;
    }
  }
  return false;
}

/* ── RENDER FILTERS ── */
function renderFilters() {
  var h = '';
  CATS.forEach(function(c) {
    var count = c === 'All' ? BLANKS.length : BLANKS.filter(function(b) { return b.cat === c; }).length;
    if (count === 0) return;
    h += '<span class="fchip ' + (st.cat === c ? 'on' : '') + '" onclick="setFilter(\'' + c + '\')">' + CAT_LABELS[c] + ' ' + count + '</span>';
  });
  document.getElementById('filter-row').innerHTML = h;
}

function renderScore() {
  var total = st.deck.length;
  var done = st.score.correct + st.score.wrong;
  var remain = total - done;
  document.getElementById('score-bar').innerHTML =
    '<span class="sc-item sc-green"><strong>' + st.score.correct + '</strong> correct</span>' +
    '<span class="sc-item sc-red"><strong>' + st.score.wrong + '</strong> wrong</span>' +
    '<span class="sc-item"><strong>' + remain + '</strong> remaining</span>';

  document.getElementById('hero-sub').textContent =
    st.deck.length + ' blanks · ' + (st.cat === 'All' ? 'all categories' : CAT_LABELS[st.cat]);
}

/* ── RENDER CARD ── */
function renderCard() {
  var main = document.getElementById('main');

  if (st.idx >= st.deck.length) {
    var pct = st.deck.length ? Math.round(st.score.correct / st.deck.length * 100) : 0;
    main.innerHTML =
      '<div class="done-card">' +
        '<div class="done-emoji">&#127881;</div>' +
        '<div class="done-title">Round complete!</div>' +
        '<div class="done-sub">' + st.score.correct + ' / ' + st.deck.length + ' correct (' + pct + '%)</div>' +
        '<button class="btn-restart" onclick="restart()">&#8635; Restart</button>' +
      '</div>';
    renderScore();
    return;
  }

  var card = st.deck[st.idx];
  var done = st.score.correct + st.score.wrong;
  var pct = st.deck.length ? Math.round(done / st.deck.length * 100) : 0;

  /* Build sentence HTML — replace ____ with input */
  var sentHtml = esc(card.text).replace('____',
    '</span><span class="blank-wrap"><input class="blank-input" id="blank-inp" autocomplete="off" spellcheck="false" placeholder="____"></span><span class="sentence-tail">');
  /* Wrap in sentence spans for correct split */
  sentHtml = '<span class="sentence-lead">' + sentHtml + '</span>';

  var stateClass = st.phase === 'correct' ? 'state-correct' : (st.phase === 'wrong' ? 'state-wrong' : '');
  var feedbackHtml = '';
  if (st.phase === 'correct') {
    feedbackHtml = '<div class="feedback ok">&#10003; Correct!</div>';
  } else if (st.phase === 'wrong') {
    feedbackHtml = '<div class="feedback err">&#10007; Not quite.</div>' +
      '<div class="reveal-ans">Answer: <strong>' + esc(card.answer) + '</strong>' +
      (card.accept && card.accept.length ? ' <span style="color:var(--gray-md)">(also: ' + card.accept.map(esc).join(', ') + ')</span>' : '') +
      '</div>';
  }

  var btnLabel = st.phase === 'idle' ? 'Check &#8594;' : 'Next &#8594;';
  var checkDisabled = st.phase !== 'idle' ? '' : '';

  main.innerHTML =
    '<div class="prog-wrap"><div class="prog-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="card ' + stateClass + '" id="blank-card">' +
      '<div class="cat-badge">' + esc(CAT_LABELS[card.cat] || card.cat) +
        '<span class="card-counter">' + (st.idx + 1) + ' / ' + st.deck.length + '</span>' +
      '</div>' +
      '<div class="sentence" id="sentence-wrap">' + sentHtml + '</div>' +
      feedbackHtml +
      '<div class="btn-row">' +
        '<button class="btn-check" id="btn-check" onclick="handleCheck()">' + btnLabel + '</button>' +
        '<button class="btn-skip" onclick="skipCard()">Skip</button>' +
        '<button class="btn-shuffle" onclick="shuffleAndReset()" title="Shuffle">&#8635; Shuffle</button>' +
      '</div>' +
    '</div>';

  renderScore();

  /* Focus input */
  var inp = document.getElementById('blank-inp');
  if (inp) {
    inp.focus();
    if (st.phase !== 'idle') {
      inp.disabled = true;
      /* Show correct answer in input */
      if (st.phase === 'wrong') inp.value = card.answer;
    }
    /* Auto-resize input width */
    inp.addEventListener('input', function() {
      inp.style.width = Math.max(6, Math.min(24, inp.value.length + 2)) + 'ch';
    });
  }
}

/* ── ACTIONS ── */
function handleCheck() {
  if (st.phase !== 'idle') {
    /* Advance to next card */
    st.idx++;
    st.phase = 'idle';
    renderCard();
    return;
  }
  var inp = document.getElementById('blank-inp');
  if (!inp) return;
  var val = inp.value;
  var card = st.deck[st.idx];
  if (checkAnswer(val, card)) {
    st.phase = 'correct';
    st.score.correct++;
  } else {
    st.phase = 'wrong';
    st.score.wrong++;
  }
  renderCard();
}

function skipCard() {
  if (st.phase === 'idle') st.score.wrong++;
  st.idx++;
  st.phase = 'idle';
  renderCard();
}

function shuffleAndReset() {
  buildDeck();
  renderCard();
}

function restart() {
  buildDeck();
  renderCard();
}

function setFilter(cat) {
  st.cat = cat;
  buildDeck();
  renderFilters();
  renderCard();
}

/* ── KEYBOARD ── */
document.addEventListener('keydown', function(e) {
  if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) {
    if (e.key === 'Enter') { e.preventDefault(); handleCheck(); }
    return;
  }
  if (e.key === 'Enter') handleCheck();
  if (e.key === 'Tab') { e.preventDefault(); skipCard(); }
  if (e.key === 'r' || e.key === 'R') restart();
});

/* ── HELPERS ── */
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── INIT ── */
buildDeck();
renderFilters();
renderCard();
</script>
</body>
</html>
