<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCM Study Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1A2E44;--navy2:#0F1F30;--blue:#2563EB;--blue-lt:#DBEAFE;--blue-mid:#93C5FD;
  --green:#166534;--green-lt:#DCFCE7;--amber:#92400E;--amber-lt:#FEF3C7;
  --red:#991B1B;--red-lt:#FEE2E2;--purple:#5B21B6;--purple-lt:#EDE9FE;
  --gray-dk:#1F2937;--gray-md:#6B7280;--gray-lt:#F3F4F6;--gray-bd:#E5E7EB;
  --white:#fff;--font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);font-size:14px;line-height:1.6;color:var(--gray-dk);background:#F8FAFC;min-height:100vh}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 60%,#1A2E44 100%);padding:40px 32px 44px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-80px;right:-80px;width:280px;height:280px;background:radial-gradient(circle,rgba(37,99,235,.18) 0%,transparent 70%);border-radius:50%}
.hero::after{content:'';position:absolute;bottom:-60px;left:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(37,99,235,.1) 0%,transparent 70%);border-radius:50%}
.hero-chip{display:inline-block;background:var(--blue);color:#fff;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:4px;margin-bottom:12px}
.hero h1{font-size:28px;font-weight:800;color:#fff;margin-bottom:6px}
.hero-sub{font-size:13px;color:var(--blue-mid);margin-bottom:24px}
.hero-back{position:absolute;top:18px;left:24px;color:rgba(255,255,255,.5);font-size:12px;text-decoration:none;transition:color .15s}
.hero-back:hover{color:#fff}

/* ── SEARCH BOX ── */
.srch-box{position:relative;max-width:560px;margin:0 auto;z-index:1}
.srch-input{width:100%;border:2px solid rgba(255,255,255,.15);border-radius:12px;padding:14px 18px 14px 46px;font-size:16px;font-family:var(--font);color:var(--gray-dk);background:rgba(255,255,255,.96);backdrop-filter:blur(10px);outline:none;transition:border-color .15s,box-shadow .15s}
.srch-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.2)}
.srch-ico{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--gray-md);pointer-events:none}
.srch-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray-md);font-size:16px;display:none;line-height:1;padding:2px}
.srch-clear.vis{display:block}
.srch-clear:hover{color:var(--gray-dk)}
.stat-row{display:flex;justify-content:center;gap:16px;margin-top:14px;flex-wrap:wrap;z-index:1;position:relative}
.stat-chip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);font-size:11px;padding:3px 10px;border-radius:99px;cursor:pointer;transition:all .15s}
.stat-chip:hover,.stat-chip.on{background:rgba(37,99,235,.4);border-color:rgba(37,99,235,.5);color:#fff}

/* ── CONTENT AREA ── */
.main{max-width:720px;margin:0 auto;padding:28px 24px 80px}

/* ── RESULTS ── */
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.results-count{font-size:13px;color:var(--gray-md)}
.results-count strong{color:var(--navy)}
.group-section{margin-bottom:24px}
.group-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray-md);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--gray-bd)}

/* ── RESULT CARD ── */
.rc{background:#fff;border:1px solid var(--gray-bd);border-radius:8px;padding:12px 14px;margin-bottom:6px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px}
.rc:hover,.rc.focused{border-color:var(--blue);background:var(--blue-lt)}
.rc.focused{box-shadow:0 0 0 2px rgba(37,99,235,.25)}
.rc-badge{flex-shrink:0;font-size:9.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 7px;border-radius:4px;margin-top:2px;white-space:nowrap}
.rc-badge.cheatsheet{background:var(--blue-lt);color:var(--blue)}
.rc-badge.glossary{background:var(--purple-lt);color:var(--purple)}
.rc-badge.note{background:var(--green-lt);color:var(--green)}
.rc-body{flex:1;min-width:0}
.rc-primary{font-size:13.5px;font-weight:600;color:var(--navy);line-height:1.3;margin-bottom:2px}
.rc-secondary{font-size:12.5px;color:var(--gray-md);line-height:1.5;white-space:pre-wrap}
.rc-meta{font-size:11px;color:var(--gray-md);margin-top:4px;font-family:var(--mono)}
.rc-action{flex-shrink:0;align-self:center}
.rc-arrow{color:var(--gray-md);font-size:14px;transition:transform .15s}
.rc:hover .rc-arrow{transform:translateX(3px);color:var(--blue)}
mark{background:#FEF9C3;color:#713F12;padding:0 1px;border-radius:2px}

/* ── NO RESULTS ── */
.nores{text-align:center;padding:48px 24px;color:var(--gray-md)}
.nores h3{font-size:17px;color:var(--gray-md);margin-bottom:6px}
.nores-q{font-family:var(--mono);font-size:13px;background:var(--gray-lt);padding:6px 12px;border-radius:6px;display:inline-block;margin-top:8px}

/* ── HUB SECTIONS ── */
.hub-section{margin-bottom:32px}
.hub-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray-md);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--gray-bd)}

/* ── TOOL CARDS ── */
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.tool-card{background:#fff;border:1.5px solid var(--gray-bd);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .15s;text-decoration:none;display:block}
.tool-card:hover{border-color:var(--blue);background:var(--blue-lt);transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,.12)}
.tc-icon{font-size:20px;margin-bottom:8px}
.tc-name{font-size:12.5px;font-weight:700;color:var(--navy);margin-bottom:4px;line-height:1.3}
.tc-desc{font-size:11px;color:var(--gray-md);line-height:1.5}

/* ── SERIES GRID ── */
.series-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.series-item{background:#fff;border:1px solid var(--gray-bd);border-radius:8px;padding:10px 14px;cursor:pointer;transition:all .15s;text-decoration:none;display:flex;align-items:flex-start;gap:10px}
.series-item:hover{border-color:var(--blue);background:var(--blue-lt)}
.si-num{font-size:11px;font-weight:700;color:var(--blue);font-family:var(--mono);min-width:18px;margin-top:2px}
.si-title{font-size:12.5px;font-weight:600;color:var(--navy);margin-bottom:2px}
.si-desc{font-size:11px;color:var(--gray-md)}

/* ── STUDY ORDER ── */
.study-order{background:#fff;border:1px solid var(--gray-bd);border-radius:10px;padding:0;display:flex;overflow:hidden}
.so-pass{flex:1;min-width:150px;padding:14px 16px;border-right:1px solid var(--gray-bd)}
.so-pass:last-child{border-right:none}
.so-num{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--blue);margin-bottom:4px;font-family:var(--mono)}
.so-text{font-size:12px;color:var(--gray-dk);line-height:1.5}

/* ── PROMPT BUILDER ── */
.pb-panel{background:#fff;border:1.5px solid var(--gray-bd);border-radius:10px;padding:18px}
.pb-row{margin-bottom:14px}
.pb-row-label{font-size:10.5px;font-weight:700;color:var(--navy);margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase}
.pb-row-hint{font-weight:400;text-transform:none;color:var(--gray-md);font-size:10px;margin-left:4px}
.topic-chips{display:flex;flex-wrap:wrap;gap:6px}
.topic-chip{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:99px;border:1.5px solid var(--gray-bd);background:#fff;color:var(--gray-md);cursor:pointer;transition:all .15s;font-family:var(--font)}
.topic-chip.on{background:var(--navy);border-color:var(--navy);color:#fff}
.mode-row{display:flex;gap:8px;flex-wrap:wrap}
.mode-btn{font-size:12px;font-weight:600;padding:6px 14px;border-radius:7px;border:1.5px solid var(--gray-bd);background:#fff;color:var(--gray-md);cursor:pointer;transition:all .15s;font-family:var(--font)}
.mode-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.weak-input{width:100%;border:1.5px solid var(--gray-bd);border-radius:7px;padding:8px 12px;font-size:12px;font-family:var(--font);color:var(--gray-dk);outline:none;resize:vertical;min-height:46px;transition:border-color .15s}
.weak-input:focus{border-color:var(--blue)}
.pb-output-label{font-size:10px;color:var(--gray-md);margin-bottom:6px;font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase}
.pb-output{background:var(--navy2);color:rgba(255,255,255,.9);border-radius:8px;padding:14px 16px;font-size:12.5px;line-height:1.75;margin-bottom:12px;min-height:52px;font-family:var(--mono);white-space:pre-wrap;border:1px solid rgba(255,255,255,.06)}
.pb-copy{border:none;background:var(--blue);color:#fff;border-radius:7px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:var(--font)}
.pb-copy:hover{background:var(--navy)}
.pb-copy.copied{background:var(--green)}

/* ── KEYBOARD HINT ── */
.kbbar{position:fixed;bottom:20px;right:20px;background:var(--navy);color:rgba(255,255,255,.65);border-radius:10px;padding:9px 13px;font-size:10px;font-family:var(--mono);line-height:1.9;z-index:200;pointer-events:none;opacity:.88}
.kbbar span{color:#fff}

@media(max-width:640px){
  .kbbar{display:none}
  .study-order{flex-direction:column}
  .so-pass{border-right:none;border-bottom:1px solid var(--gray-bd)}
  .so-pass:last-child{border-bottom:none}
}
</style>
</head>

  {t:'gl',term:'CPT',full:'Current Procedural Terminology',def:'5-digit numeric codes (e.g. 10040) published by the AMA to describe medical procedures, services, or treatments on a claim.'},
  {t:'gl',term:'ICD',full:'International Classification of Disease',def:'Alphanumeric codes used to represent the patient medical condition, disease, or symptoms (e.g. R51 = Headache).'},
  {t:'gl',term:'NPI',full:'National Provider Identifier',def:'A unique 10-digit number assigned to every individual healthcare provider for use on all HIPAA-standard transactions.'},
  {t:'gl',term:'TIN',full:'Tax Identification Number',def:'A 9-digit identifier shared by multiple providers within an organization, used for tax and billing purposes.'},
  {t:'gl',term:'COB',full:'Coordination of Benefits',def:'The process of determining which payer is primary, secondary, or tertiary when a member has multiple insurance coverages.'},
  {t:'gl',term:'EOB',full:'Explanation of Benefits',def:'A detailed summary of a processed claim sent by the insurance to both the provider and the member showing what was paid and what was denied.'},
  {t:'gl',term:'PHI',full:'Protected Health Information',def:'Individually identifiable health information (name, DOB, SSN, MRN, etc.) that must be kept confidential under HIPAA.'},
  {t:'gl',term:'OOP',full:'Out of Pocket',def:'The total annual ceiling on a member spending (Deductible + Co-Insurance + Co-Pay + non-covered); once reached, insurance covers 100%.'},
  {t:'gl',term:'TFL',full:'Timely Filing Limit',def:'The deadline set by an insurance plan within which a provider must submit a claim; missing it results in automatic denial.'},
  {t:'gl',term:'TAT',full:'Turn Around Time',def:'The time interval the adjudication team takes to decide whether to pay, deny, or pend a claim (also applies to authorizations).'},
  {t:'gl',term:'PCP',full:'Primary Care Physician',def:"The member's first point of contact and gatekeeper; refers the member to specialists and initiates authorizations under HMO plans."},
  {t:'gl',term:'SNF',full:'Skilled Nursing Facility',def:'A recovery center providing post-surgical care and Activities of Daily Living (ADL) such as bathing, cooking, and occupational therapy.'},
  {t:'gl',term:'ASC',full:'Ambulatory Surgical Center',def:'A same-day surgery center for short procedures (e.g. cataract surgery) where the patient is admitted and discharged the same day.'},
  {t:'gl',term:'HMO',full:'Health Maintenance Organization',def:'A managed care plan requiring members to use in-network providers only and obtain a PCP referral before seeing specialists; generally lower cost.'},
  {t:'gl',term:'PPO',full:'Preferred Provider Organization',def:'A managed care plan allowing members to see any provider (in- or out-of-network) without a referral; higher cost for out-of-network use.'},
  {t:'gl',term:'EPO',full:'Exclusive Provider Organization',def:'A managed care plan similar to HMO (in-network only) but without requiring a PCP referral for specialists.'},
  {t:'gl',term:'POS',full:'Point of Service (plan) / Place of Service (code)',def:'As a plan: hybrid HMO/PPO. As a claim code: 2-digit number indicating where the service was rendered (e.g. 24=ASC, 12=Home).'},
  {t:'gl',term:'CMS',full:'Centers for Medicare & Medicaid Services',def:'The federal agency within DHHS that administers Medicare, Medicaid, CHIP, and the Health Insurance Marketplace.'},
  {t:'gl',term:'RCM',full:'Revenue Cycle Management',def:'The end-to-end financial process healthcare organizations use to track patient care from registration through final payment.'},
  {t:'gl',term:'FFS',full:'Fee for Service',def:'A payment model where providers are paid separately for each service rendered; the more procedures, the more revenue.'},
  {t:'gl',term:'DOS',full:'Date of Service',def:'The date on which the medical service or procedure was actually performed; must fall within the active coverage period.'},
  {t:'gl',term:'ADL',full:'Activities of Daily Living',def:'Everyday functions (bathing, dressing, eating, cooking) that SNFs help post-surgical patients regain and maintain.'},
  {t:'gl',term:'ERA',full:'Electronic Remittance Advice',def:"An electronic version of the EOB sent from the payer to the provider's billing system, detailing payment decisions on submitted claims."},
  {t:'gl',term:'EDI',full:'Electronic Data Interchange',def:'The standard electronic format (e.g. 837P, 835) used to transmit healthcare claims and payment information between providers and payers.'},
  {t:'gl',term:'INN',full:'In-Network',def:'A provider who has a contract with the payer (participating provider); members pay lower cost-sharing for in-network services.'},
  {t:'gl',term:'OON',full:'Out-of-Network',def:'A provider without a contract with the payer (non-participating); members pay higher cost-sharing or full cost for out-of-network services.'},
];

const NOTES = [

  {t:'note',title:'Participants & HIPAA',desc:'The 5 players · PHI · 4 HIPAA entities',url:'/Saptak/notes/rcm/rcm-participants-hipaa'},
  {t:'note',title:'Plans & Medicare',desc:'Medicare vs Medicaid · Parts A-D · DME · Gov programs',url:'/Saptak/notes/rcm/rcm-plans-medicare'},
  {t:'note',title:'Managed Care',desc:'HMO vs PPO · EPO · POS · managed care rules',url:'/Saptak/notes/rcm/rcm-managed-care'},
  {t:'note',title:'Providers & Authorization',desc:'Provider types · INN/OON · auth/referral · capitation vs FFS',url:'/Saptak/notes/rcm/rcm-providers-auth'},
  {t:'note',title:'Medical Coding',desc:'CPT · ICD · HCPCS · Modifiers · POS codes',url:'/Saptak/notes/rcm/rcm-coding'},
  {t:'note',title:'Claims & Patient Responsibility',desc:'TFL · TAT · NPI/TIN · 3 denials · COB · EOB · PR1/2/3 · OOP',url:'/Saptak/notes/rcm/rcm-claims-patient-resp'},
  {t:'note',title:'All Diagrams',desc:'13 mermaid diagrams — the complete visual study map',url:'/Saptak/notes/rcm/rcm-diagrams'},
];

/* Search tool removed — this page IS the hub. Cheatsheet/dashboard/all-in-one kept. */
const TOOLS = [
  {t:'note',title:'All-in-One Reference',desc:'Entire RCM series + 13 diagrams on one printable page',url:'/Saptak/notes/rcm/all-in-one.html'},
  {t:'note',title:'Study Dashboard',desc:'Progress across notes + drill stats + glossary',url:'/Saptak/notes/rcm/dashboard.html'},
  {t:'note',title:'Fill-in-the-Blanks',desc:'Cloze drill — type the missing term, check, score, shuffle',url:'/Saptak/notes/rcm/blanks'},
  {t:'note',title:'FAQ',desc:'Why / how questions — accordion by category, live search',url:'/Saptak/notes/rcm/faq'},
  {t:'note',title:'Differences',desc:'Side-by-side comparisons — HMO/PPO, Medicare/Medicaid, CPT/ICD and more. Quiz B column.',url:'/Saptak/notes/rcm/differences'},
];

const INDEX = [
  ...CS.map((r,i)   => ({...r, _id:`cs-${i}`, _text:`${r.cue} ${r.ans} ${r.section}`.toLowerCase()})),
  ...GL.map((r,i)   => ({...r, _id:`gl-${i}`, _text:`${r.term} ${r.full} ${r.def}`.toLowerCase()})),
  ...NOTES.map((r,i)=> ({...r, _id:`nt-${i}`, _text:`${r.title} ${r.desc}`.toLowerCase()})),
  ...TOOLS.map((r,i)=> ({...r, _id:`tl-${i}`, _text:`${r.title} ${r.desc}`.toLowerCase()})),
];

document.getElementById('hero-sub').textContent =
  CS.length + ' cheat-sheet facts \xb7 ' + GL.length + ' glossary terms \xb7 ' + NOTES.length + ' notes — ' + INDEX.length + ' items indexed';

/* =====================================================
   STATE
===================================================== */
const st = { q:'', filter:'all', expandedId:null };

/* =====================================================
   SEARCH ENGINE
===================================================== */
function score(item, tokens, raw) {
  const txt = item._text;
  let s = 0;
  if (txt.includes(raw)) s += 6;
  const primary = (item.cue || item.term || item.title || '').toLowerCase();
  tokens.forEach(tok => {
    if (!tok) return;
    if (primary.includes(tok)) s += 3;
    if (txt.includes(tok)) s += 1;
  });
  return s;
}

function search(q) {
  if (!q.trim()) return [];
  const raw = q.trim().toLowerCase();
  const tokens = raw.split(/\s+/);
  const results = [];
  INDEX.forEach(item => {
    const s = score(item, tokens, raw);
    if (s > 0) results.push(Object.assign({}, item, {_score: s}));
  });
  results.sort((a,b) => b._score - a._score);
  return results.slice(0, 40);
}

/* =====================================================
   RENDER HELPERS
===================================================== */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function hi(text, q) {
  if (!q) return esc(text);
  var e = esc(text);
  var re = new RegExp('(' + q.trim().replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return e.replace(re,'<mark>$1</mark>');
}

function trunc(s, n) { n = n||120; return s && s.length > n ? s.slice(0,n) + '…' : s; }

var TYPE_LABELS = {cs:'Cheat Sheet', gl:'Glossary', note:'Page'};
var TYPE_BADGE  = {cs:'cheatsheet',  gl:'glossary',  note:'note'};

/* =====================================================
   FILTERS
===================================================== */
function renderFilters() {
  var counts = {all:INDEX.length, cs:CS.length, gl:GL.length, note:NOTES.length+TOOLS.length};
  var labels  = {all:'All', cs:'Cheat Sheet', gl:'Glossary', note:'Pages'};
  var h = '';
  ['all','cs','gl','note'].forEach(function(k) {
    h += '<span class="stat-chip ' + (st.filter===k?'on':'') + '" onclick="setFilter(\'' + k + '\')">' + labels[k] + ' ' + counts[k] + '</span>';
  });
  document.getElementById('filter-chips').innerHTML = h;
}

/* =====================================================
   RESULT CARDS
===================================================== */
function renderCard(item, q) {
  var badge    = TYPE_BADGE[item.t]  || 'note';
  var label    = TYPE_LABELS[item.t] || 'Page';
  var expanded = st.expandedId === item._id;

  if (item.t === 'cs') {
    return '<div class="rc ' + (expanded?'focused':'') + '" id="rc-' + item._id + '" onclick="toggleDetail(\'' + item._id + '\')">' +
      '<span class="rc-badge ' + badge + '">' + label + '</span>' +
      '<div class="rc-body">' +
        '<div class="rc-primary">' + hi(item.cue,q) + '</div>' +
        '<div class="rc-secondary">' + (expanded ? esc(item.ans) : hi(trunc(item.ans,90),q)) + '</div>' +
        (expanded ? '<div class="rc-meta">Section: ' + esc(item.section) + '</div>' : '') +
      '</div>' +
      '<div class="rc-action"><span class="rc-arrow">' + (expanded?'&#9650;':'&#9660;') + '</span></div>' +
    '</div>';
  }

  if (item.t === 'gl') {
    return '<div class="rc ' + (expanded?'focused':'') + '" id="rc-' + item._id + '" onclick="toggleDetail(\'' + item._id + '\')">' +
      '<span class="rc-badge ' + badge + '">' + label + '</span>' +
      '<div class="rc-body">' +
        '<div class="rc-primary">' + hi(item.term,q) + ' <span style="font-weight:400;font-size:12px;color:var(--gray-md)">— ' + hi(item.full,q) + '</span></div>' +
        '<div class="rc-secondary">' + hi(trunc(item.def,100),q) + '</div>' +
      '</div>' +
      '<div class="rc-action"><span class="rc-arrow">' + (expanded?'&#9650;':'&#9660;') + '</span></div>' +
    '</div>';
  }

  if (item.t === 'note') {
    return '<div class="rc" id="rc-' + item._id + '" onclick="window.location=\'' + item.url + '\'">' +
      '<span class="rc-badge ' + badge + '">' + label + '</span>' +
      '<div class="rc-body">' +
        '<div class="rc-primary">' + hi(item.title,q) + '</div>' +
        '<div class="rc-secondary">' + hi(item.desc,q) + '</div>' +
      '</div>' +
      '<div class="rc-action"><span class="rc-arrow">→</span></div>' +
    '</div>';
  }
  return '';
}

function toggleDetail(id) {
  st.expandedId = st.expandedId === id ? null : id;
  renderMain();
  if (st.expandedId) {
    var el = document.getElementById('rc-' + st.expandedId);
    if (el) el.scrollIntoView({block:'nearest'});
  }
}

/* =====================================================
   MAIN RENDERER
===================================================== */
function renderMain() {
  var main = document.getElementById('main');
  var q = st.q.trim();

  if (!q) { renderHub(); return; }

  var results = search(q);
  if (st.filter !== 'all') {
    results = results.filter(function(r) { return r.t === st.filter || (st.filter==='note' && r.t==='note'); });
  }

  if (!results.length) {
    main.innerHTML = '<div class="nores"><h3>No results found</h3><p>Try a shorter term or a related keyword.</p><p class="nores-q">"' + esc(q) + '"</p></div>';
    return;
  }

  var groups = {cs:[], gl:[], note:[]};
  results.forEach(function(r) { if (groups[r.t]) groups[r.t].push(r); });

  var ORDER  = ['note','cs','gl'];
  var GNAMES = {cs:'Cheat Sheet Facts', gl:'Glossary Terms', note:'Study Pages'};

  var h = '<div class="results-header"><span class="results-count"><strong>' + results.length + '</strong> results for &ldquo;' + esc(q) + '&rdquo;</span></div>';

  ORDER.forEach(function(type) {
    var g = groups[type];
    if (!g || !g.length) return;
    h += '<div class="group-section"><div class="group-label">' + GNAMES[type] + ' \xb7 ' + g.length + '</div>';
    g.forEach(function(item) { h += renderCard(item, q); });
    h += '</div>';
  });

  main.innerHTML = h;
}

/* =====================================================
   HUB (empty-state)
===================================================== */
var TOPIC_LABELS = [
  'Revenue Cycle Overview',
  'Participants & HIPAA',
  'Plans & Medicare',
  'Managed Care',
  'Providers & Authorization',
  'Medical Coding',
  'Claims & Patient Responsibility',
  'All Diagrams',
];

var pbSt = { topics: [], mode: 'read', weak: '' };

function renderHub() {
  var TOOL_CARDS = [
    {icon:'&#128203;', name:'Master Cheat-Sheet', desc:'73 facts \xb7 blur/reveal \xb7 mastery tracking \xb7 keyboard nav', url:'/Saptak/notes/rcm/cheatsheet.html'},
    {icon:'&#128194;', name:'Drill — Flashcard + MCQ', desc:'Active recall \xb7 flip cards \xb7 MCQ quiz \xb7 mark weak areas', url:'/Saptak/notes/rcm/drill'},
    {icon:'&#9998;', name:'Fill-in-the-Blanks', desc:'Type the missing term \xb7 check answer \xb7 score \xb7 shuffle', url:'/Saptak/notes/rcm/blanks'},
    {icon:'&#10067;', name:'FAQ', desc:'Why / how questions \xb7 searchable \xb7 grouped by topic', url:'/Saptak/notes/rcm/faq'},
    {icon:'&#8596;', name:'Differences', desc:'Side-by-side pairs \xb7 quiz B column \xb7 click to reveal', url:'/Saptak/notes/rcm/differences'},
    {icon:'&#128202;', name:'Study Dashboard', desc:'Progress across notes + drill stats + glossary search', url:'/Saptak/notes/rcm/dashboard.html'},
    {icon:'&#128214;', name:'All-in-One Reference', desc:'Entire RCM series + 13 diagrams on one printable page', url:'/Saptak/notes/rcm/all-in-one.html'},
    {icon:'&#129504;', name:'Ontology', desc:'Formal definitions \xb7 A–Z glossary \xb7 ERD \xb7 mindmap \xb7 concept relationships', url:'/Saptak/notes/rcm/ontology'},
  ];

  var h = '';

  /* TOOLS */
  h += '<div class="hub-section"><div class="hub-label">Active Study Tools</div><div class="tool-grid">';
  TOOL_CARDS.forEach(function(c) {
    h += '<a class="tool-card" href="' + c.url + '"><div class="tc-icon">' + c.icon + '</div><div class="tc-name">' + c.name + '</div><div class="tc-desc">' + c.desc + '</div></a>';
  });
  h += '</div></div>';

  /* SERIES INDEX */
  h += '<div class="hub-section"><div class="hub-label">Series Index — 8 Notes</div><div class="series-grid">';
  NOTES.forEach(function(note, i) {
    h += '<a class="series-item" href="' + note.url + '"><div class="si-num">' + (i+1) + '</div><div><div class="si-title">' + esc(note.title) + '</div><div class="si-desc">' + esc(note.desc) + '</div></div></a>';
  });
  h += '</div></div>';

  /* STUDY ORDER */
  h += '<div class="hub-section"><div class="hub-label">Study Order</div><div class="study-order">' +
    '<div class="so-pass"><div class="so-num">First pass</div><div class="so-text">Read notes 1 → 8 in order for a complete overview of the revenue cycle.</div></div>' +
    '<div class="so-pass"><div class="so-num">Second pass</div><div class="so-text">Drill — mark weak areas, use &ldquo;Copy prompt&rdquo; below to go deeper with Claude.</div></div>' +
    '<div class="so-pass"><div class="so-num">Third pass</div><div class="so-text">Cheat-sheet blur mode — cover answers, test yourself row by row.</div></div>' +
  '</div></div>';

  /* PROMPT BUILDER */
  var chips = TOPIC_LABELS.map(function(t) {
    var on = pbSt.topics.indexOf(t) !== -1;
    return '<button class="topic-chip' + (on?' on':'') + '" data-t="' + esc(t) + '" onclick="toggleTopic(this)">' + esc(t) + '</button>';
  }).join('');

  var modes = [
    {m:'read',  label:'&#128214; Read-through'},
    {m:'drill', label:'&#128194; Active-recall drill'},
    {m:'blur',  label:'&#127919; Cheat-sheet blur'},
  ].map(function(b) {
    return '<button class="mode-btn' + (pbSt.mode===b.m?' on':'') + '" data-m="' + b.m + '" onclick="setMode(this)">' + b.label + '</button>';
  }).join('');

  h += '<div class="hub-section"><div class="hub-label">Study Session Prompt Builder</div>' +
  '<div class="pb-panel">' +
    '<div class="pb-row"><div class="pb-row-label">Topics <span class="pb-row-hint">(none = all topics)</span></div><div class="topic-chips">' + chips + '</div></div>' +
    '<div class="pb-row"><div class="pb-row-label">Study mode</div><div class="mode-row">' + modes + '</div></div>' +
    '<div class="pb-row"><div class="pb-row-label">Weak areas <span class="pb-row-hint">(optional)</span></div>' +
      '<textarea class="weak-input" id="pb-weak" placeholder="e.g. capitation, COB, Medicare Parts, denial reasons…" oninput="pbSt.weak=this.value;updatePbPrompt()">' + esc(pbSt.weak) + '</textarea>' +
    '</div>' +
    '<div class="pb-output-label">Generated prompt — paste into Claude</div>' +
    '<div class="pb-output" id="pb-out"></div>' +
    '<button class="pb-copy" id="pb-copy-btn" onclick="copyPbPrompt()">&#128203; Copy prompt</button>' +
  '</div></div>';

  document.getElementById('main').innerHTML = h;
  updatePbPrompt();
}

function toggleTopic(btn) {
  var t = btn.dataset.t;
  var idx = pbSt.topics.indexOf(t);
  if (idx === -1) pbSt.topics.push(t);
  else pbSt.topics.splice(idx, 1);
  btn.classList.toggle('on', pbSt.topics.indexOf(t) !== -1);
  updatePbPrompt();
}

function setMode(btn) {
  pbSt.mode = btn.dataset.m;
  document.querySelectorAll('.mode-btn').forEach(function(el) {
    el.classList.toggle('on', el.dataset.m === pbSt.mode);
  });
  updatePbPrompt();
}

function updatePbPrompt() {
  var el = document.getElementById('pb-out');
  if (!el) return;
  var topics = pbSt.topics;
  var parts  = [];

  if (topics.length === 0) {
    parts.push('Help me study US Healthcare Revenue Cycle Management (RCM) — all topics.');
  } else if (topics.length === 1) {
    parts.push('Help me study "' + topics[0] + '" from US Healthcare Revenue Cycle Management (RCM).');
  } else {
    var last = topics[topics.length - 1];
    var rest = topics.slice(0, -1).join(', ');
    parts.push('Help me study these RCM topics: ' + rest + ', and ' + last + '.');
  }

  if (pbSt.mode === 'drill') {
    parts.push('Quiz me with active-recall MCQs, one at a time. After each answer, tell me if I was right and explain anything I missed.');
  } else if (pbSt.mode === 'blur') {
    parts.push('Present each fact as a cue only. Wait for my answer before revealing it. Work through them one at a time, correcting me and filling gaps as we go.');
  } else if (topics.length > 0) {
    parts.push('Walk me through the key concepts and definitions systematically.');
  }

  var w = pbSt.weak.trim();
  if (w) parts.push('Pay extra attention to these areas I find tricky: ' + w + '.');

  el.textContent = parts.join(' ');
}

function copyPbPrompt() {
  var txt = document.getElementById('pb-out').textContent;
  if (!txt) return;
  navigator.clipboard.writeText(txt).then(function() {
    var btn = document.getElementById('pb-copy-btn');
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = '📋 Copy prompt';
      btn.classList.remove('copied');
    }, 2000);
  });
}

/* =====================================================
   SEARCH CONTROLS
===================================================== */
function setFilter(f) {
  st.filter = f;
  renderFilters();
  renderMain();
}

function clearSearch() {
  document.getElementById('srch').value = '';
  st.q = '';
  st.expandedId = null;
  document.getElementById('srch-clear').classList.remove('vis');
  renderMain();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { clearSearch(); document.getElementById('srch').blur(); }
});

document.getElementById('srch').addEventListener('input', function() {
  st.q = this.value;
  st.expandedId = null;
  document.getElementById('srch-clear').classList.toggle('vis', !!this.value);
  renderMain();
});

/* =====================================================
   INIT
===================================================== */
renderFilters();
renderMain();
</script>
